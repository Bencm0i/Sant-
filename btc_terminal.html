<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC/USDT — Terminal</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%2305080a'/%3E%3Ccircle cx='32' cy='32' r='26' fill='none' stroke='%2300ff9d' stroke-width='3'/%3E%3Ctext x='32' y='42' font-family='monospace' font-size='30' font-weight='700' fill='%2300ff9d' text-anchor='middle'%3E%E2%82%BF%3C/text%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&display=swap');

  :root{
    --bg: #05080a;
    --panel: #0c1116;
    --panel-2: #10161c;
    --grid: #1a2129;
    --border: #202a33;
    --txt: #d7e2e8;
    --txt-dim: #5f7381;
    --green: #00ff9d;
    --green-dim: #0a3d2c;
    --red: #ff4d5e;
    --red-dim: #431018;
    --cyan: #35c7ff;
    --amber: #ffb020;
    --violet: #a78bfa;
    --flashy: #ff2fd6;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html,body{
    background:var(--bg); color:var(--txt);
    font-family:'IBM Plex Mono', monospace;
    height:100%;
  }
  #app{ display:flex; flex-direction:column; min-height:100vh; }

  /* HEADER */
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:14px 20px; border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, var(--panel-2), var(--panel));
    flex-wrap:wrap; gap:10px;
  }
  .brand{ display:flex; align-items:center; gap:12px; }
  .brand .dot{
    width:9px; height:9px; border-radius:50%; background:var(--green);
    box-shadow:0 0 8px var(--green); animation:pulse 1.6s infinite ease-in-out;
  }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:.35;} }
  .brand h1{ font-size:15px; font-weight:600; letter-spacing:1px; color:var(--txt); }
  .brand .sub{ font-size:10px; color:var(--txt-dim); letter-spacing:2px; }

  .quote-toggle{ display:flex; gap:2px; margin-left:6px; border:1px solid var(--border); border-radius:4px; padding:2px; }
  button.qt{
    background:transparent; border:none; color:var(--txt-dim); font-family:inherit;
    font-size:10px; font-weight:600; padding:4px 9px; border-radius:3px; cursor:pointer; letter-spacing:0.5px;
    transition:all .15s;
  }
  button.qt:hover{ color:var(--amber); }
  button.qt.active{ background:var(--amber); color:#05080a; }

  .price-block{ text-align:right; }
  .price-block .px{ font-size:26px; font-weight:700; letter-spacing:0.5px; }
  .price-block .chg{ font-size:12px; font-weight:600; }
  .up{ color:var(--green); } .down{ color:var(--red); }

  .meta-row{ display:flex; gap:18px; font-size:10px; color:var(--txt-dim); margin-top:4px; flex-wrap:wrap; }
  .meta-row span b{ color:var(--txt); font-weight:600; }

  /* CONTROLS */
  .controls{
    display:flex; align-items:center; gap:8px; padding:10px 20px;
    border-bottom:1px solid var(--border); background:var(--panel);
    flex-wrap:wrap;
  }
  .tf-group{ display:flex; gap:4px; }
  button.tf{
    background:transparent; border:1px solid var(--border); color:var(--txt-dim);
    font-family:inherit; font-size:11px; padding:5px 10px; border-radius:3px; cursor:pointer;
    transition:all .15s;
  }
  button.tf:hover{ border-color:var(--cyan); color:var(--cyan); }
  button.tf.active{ background:var(--cyan); color:#05080a; border-color:var(--cyan); font-weight:600; }

  .divider{ width:1px; height:20px; background:var(--border); margin:0 6px; }

  .toggle{
    display:flex; align-items:center; gap:6px; font-size:11px; color:var(--txt-dim);
    cursor:pointer; user-select:none; padding:5px 8px; border-radius:3px; border:1px solid transparent;
  }
  .toggle:hover{ border-color:var(--border); }
  .toggle input{ accent-color:var(--cyan); cursor:pointer; }
  .toggle.on{ color:var(--txt); }
  .swatch{ width:9px; height:9px; border-radius:2px; display:inline-block; }

  .refresh-btn{
    margin-left:auto; background:var(--panel-2); border:1px solid var(--border); color:var(--txt-dim);
    font-family:inherit; font-size:11px; padding:6px 12px; border-radius:3px; cursor:pointer;
  }
  .refresh-btn:hover{ color:var(--green); border-color:var(--green); }
  .refresh-btn.loading{ color:var(--amber); border-color:var(--amber); }

  .tool-group{ display:flex; gap:4px; }
  button.tool{
    background:transparent; border:1px solid var(--border); color:var(--txt-dim);
    font-family:inherit; font-size:11px; padding:5px 10px; border-radius:3px; cursor:pointer;
    transition:all .15s; display:flex; align-items:center; gap:5px;
  }
  button.tool:hover{ border-color:var(--amber); color:var(--amber); }
  button.tool.active{ background:var(--amber); color:#05080a; border-color:var(--amber); font-weight:600; }

  .lines-row{
    display:flex; align-items:center; gap:6px; padding:6px 20px; flex-wrap:wrap;
    border-bottom:1px solid var(--border); background:var(--panel); font-size:10.5px;
  }
  .lines-row.empty{ display:none; }
  .lines-row .lbl{ color:var(--txt-dim); letter-spacing:1px; text-transform:uppercase; font-size:9px; margin-right:2px; }
  .line-chip{
    display:flex; align-items:center; gap:6px; background:var(--panel-2); border:1px solid var(--border);
    border-radius:3px; padding:3px 4px 3px 8px; color:var(--amber); font-weight:600;
  }
  .line-chip button{
    background:transparent; border:none; color:var(--txt-dim); cursor:pointer; font-size:12px;
    line-height:1; padding:2px 5px; border-radius:2px;
  }
  .line-chip button:hover{ color:var(--red); background:var(--red-dim); }
  .cost-chip{
    color:var(--flashy) !important; border-color:var(--flashy) !important;
    box-shadow:0 0 6px rgba(255,47,214,0.35);
  }
  .cost-chip button:hover{ color:var(--flashy); background:rgba(255,47,214,0.12); }
  .cost-chip button.lock-btn.locked{ color:var(--flashy); }
  .hint{ color:var(--txt-dim); font-size:9.5px; margin-left:4px; }

  /* CHART */
  .chart-wrap{
    flex:1; position:relative; padding:6px 0 0 0; display:flex; flex-direction:column;
  }
  #status{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    color:var(--txt-dim); font-size:12px; letter-spacing:1px; text-align:center; z-index:5;
  }
  #status.hidden{ display:none; }

  canvas{ display:block; width:100%; }
  #priceCanvas{ height:58vh; min-height:340px; cursor:grab; }
  #rsiCanvas{ height:14vh; min-height:90px; border-top:1px solid var(--grid); cursor:crosshair; }

  .tooltip{
    position:absolute; pointer-events:none; background:rgba(10,16,20,.96);
    border:1px solid var(--border); border-radius:4px; padding:8px 10px; font-size:10.5px;
    line-height:1.6; color:var(--txt-dim); z-index:10; display:none; white-space:nowrap;
    box-shadow:0 4px 16px rgba(0,0,0,.5);
  }
  .tooltip b{ color:var(--txt); }
  .tooltip .row{ display:flex; gap:10px; justify-content:space-between; }

  .panel-label{
    position:absolute; font-size:9.5px; color:var(--txt-dim); letter-spacing:1.5px;
    text-transform:uppercase; padding:4px 8px; z-index:3;
  }

  footer{
    padding:8px 20px; border-top:1px solid var(--border); background:var(--panel);
    font-size:9.5px; color:var(--txt-dim); display:flex; justify-content:space-between; flex-wrap:wrap; gap:6px;
  }

  @media (max-width:640px){
    .price-block .px{ font-size:20px; }
    .controls{ gap:6px; }
    button.tf{ padding:4px 8px; font-size:10px; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <span class="dot"></span>
      <div>
        <h1 id="pairTitle">BTC / EUR</h1>
        <div class="sub">ICHIMOKU · KOUMORI TERMINAL</div>
      </div>
      <div class="quote-toggle" id="quoteToggle">
        <button class="qt" data-q="USDT">USD</button>
        <button class="qt active" data-q="EUR">EUR</button>
      </div>
    </div>
    <div class="price-block">
      <div class="px" id="pxNow">—</div>
      <div class="chg" id="pxChg">—</div>
      <div class="meta-row">
        <span>H24 <b id="mH24">—</b></span>
        <span>L24 <b id="mL24">—</b></span>
        <span>VOL <b id="mVol">—</b></span>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="tf-group" id="tfGroup">
      <button class="tf" data-tf="15m">15m</button>
      <button class="tf" data-tf="1h">1H</button>
      <button class="tf" data-tf="4h">4H</button>
      <button class="tf active" data-tf="1d">1D</button>
      <button class="tf" data-tf="1w">1W</button>
    </div>
    <div class="divider"></div>
    <label class="toggle on" id="tgIchimoku">
      <input type="checkbox" checked> <span class="swatch" style="background:var(--green)"></span> Ichimoku
    </label>
    <label class="toggle on" id="tgEma">
      <input type="checkbox" checked> <span class="swatch" style="background:var(--violet)"></span> EMA 20/50
    </label>
    <label class="toggle on" id="tgRsi">
      <input type="checkbox" checked> <span class="swatch" style="background:var(--cyan)"></span> RSI 14
    </label>
    <label class="toggle on" id="tgVol">
      <input type="checkbox" checked> <span class="swatch" style="background:#3a4753"></span> Volume
    </label>
    <div class="divider"></div>
    <div class="tool-group">
      <button class="tool" id="drawBtn" title="Cliquer sur le graphique pour placer une ligne horizontale">✏️ S/R</button>
      <button class="tool" id="freehandBtn" title="Dessin libre à main levée sur le graphique">✍️ Libre</button>
      <button class="tool" id="measureBtn" title="Cliquer-glisser entre deux points pour mesurer le %">📏 Mesure</button>
      <button class="tool" id="costBtn" title="Cliquer sur le graphique pour placer le prix de revient">💰 P.Revient</button>
      <button class="tool" id="zoomInBtn" title="Zoomer">🔍+</button>
      <button class="tool" id="zoomOutBtn" title="Dézoomer">🔍−</button>
      <button class="tool" id="resetViewBtn" title="Réinitialiser la vue">⤢ Reset</button>
      <button class="tool" id="clearLinesBtn" title="Effacer toutes les lignes">🗑 Lignes</button>
      <button class="tool" id="clearFreehandBtn" title="Effacer les dessins libres">🗑 Dessins</button>
    </div>
    <button class="refresh-btn" id="refreshBtn">⟳ ACTUALISER</button>
  </div>

  <div class="lines-row empty" id="linesRow">
    <span class="lbl">Support / Résistance</span>
    <div id="linesChips" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
  </div>

  <div class="lines-row empty" id="costRow">
    <span class="lbl">Prix de revient</span>
    <div id="costChipWrap" style="display:flex; gap:6px; flex-wrap:wrap;"></div>
  </div>

  <div class="chart-wrap">
    <div id="status">CONNEXION BINANCE…</div>
    <span class="panel-label" style="top:52px; left:14px;">PRIX + ICHIMOKU KINKO HYO</span>
    <canvas id="priceCanvas"></canvas>
    <span class="panel-label" id="rsiLabel" style="left:14px;">RSI (14)</span>
    <canvas id="rsiCanvas"></canvas>
    <div class="tooltip" id="tooltip"></div>
  </div>

  <footer>
    <span>Source : Binance Public API (klines, temps réel)</span>
    <span id="lastUpdate">—</span>
  </footer>

</div>

<script>
(function(){
  const state = {
    tf: '1d',
    candles: [],       // {t,o,h,l,c,v}
    ichimoku: [],       // {tenkan,kijun,senkouA,senkouB,chikou}
    ema20: [], ema50: [],
    rsi: [],
    show: { ichimoku:true, ema:true, rsi:true, vol:true },
    hoverIdx: null,
    loading: false,
    viewEnd: 0,        // index (into candles[]) of rightmost visible candle
    viewCount: 140,     // number of candles visible
    lines: [],          // {id, price} horizontal S/R lines
    nextLineId: 1,
    drawMode: false,
    quote: 'EUR',       // 'USDT' (affiché USD) ou 'EUR'
    freehandMode: false,
    freehandStrokes: [], // [[{idx,price}, ...], ...]
    measureMode: false,
    measurement: null,   // {start:{idx,price}, end:{idx,price}} règle de mesure persistée
    costMode: false,
    costLine: null        // {price, locked} prix de revient (flashy, verrouillable)
  };

  // interaction (pan / line-drag) — module scope, not persisted
  let isPanning = false, panStartX = 0, panStartViewEnd = 0;
  let draggingLineId = null, hoverLineId = null;
  let currentPmin = 0, currentPmax = 1, currentChartH = 0;
  let isFreehandDrawing = false, currentStroke = null;
  let isMeasuring = false, measureStart = null, measureEnd = null;
  let draggingCost = false;

  const TF_MAP = {
    '15m': {interval:'15m', limit:300},
    '1h':  {interval:'1h',  limit:300},
    '4h':  {interval:'4h',  limit:300},
    '1d':  {interval:'1d',  limit:300},
    '1w':  {interval:'1w',  limit:260},
  };

  function symbolNow(){ return 'BTC' + state.quote; }
  function currencySymbol(){ return state.quote === 'EUR' ? '€' : '$'; }

  // ---------- PERSISTANCE LOCALE (localStorage) ----------
  const LS_LINES = 'btcTerminal_lines';
  const LS_FREEHAND = 'btcTerminal_freehand';

  function saveLines(){
    try{ localStorage.setItem(LS_LINES, JSON.stringify(state.lines)); }catch(e){}
  }
  function loadLines(){
    try{
      const raw = localStorage.getItem(LS_LINES);
      if(!raw) return;
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed)){
        state.lines = parsed;
        state.nextLineId = parsed.reduce((m,l)=>Math.max(m,l.id||0), 0) + 1;
      }
    }catch(e){}
  }
  function saveFreehand(){
    try{ localStorage.setItem(LS_FREEHAND, JSON.stringify(state.freehandStrokes)); }catch(e){}
  }
  function loadFreehand(){
    try{
      const raw = localStorage.getItem(LS_FREEHAND);
      if(!raw) return;
      const parsed = JSON.parse(raw);
      if(Array.isArray(parsed)) state.freehandStrokes = parsed;
    }catch(e){}
  }
  const LS_COST = 'btcTerminal_costLine';
  function saveCostLine(){
    try{ localStorage.setItem(LS_COST, JSON.stringify(state.costLine)); }catch(e){}
  }
  function loadCostLine(){
    try{
      const raw = localStorage.getItem(LS_COST);
      if(!raw) return;
      const parsed = JSON.parse(raw);
      if(parsed && typeof parsed.price === 'number'){
        state.costLine = { price: parsed.price, locked: !!parsed.locked };
      }
    }catch(e){}
  }
  loadLines();
  loadFreehand();
  loadCostLine();

  const priceCanvas = document.getElementById('priceCanvas');
  const rsiCanvas = document.getElementById('rsiCanvas');
  const pctx = priceCanvas.getContext('2d');
  const rctx = rsiCanvas.getContext('2d');
  const statusEl = document.getElementById('status');
  const tooltip = document.getElementById('tooltip');
  const rsiLabel = document.getElementById('rsiLabel');

  // ---------- DATA FETCH ----------
  async function fetchKlines(tf){
    const cfg = TF_MAP[tf];
    const url = `https://api.binance.com/api/v3/klines?symbol=${symbolNow()}&interval=${cfg.interval}&limit=${cfg.limit}`;
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    return raw.map(k => ({
      t: k[0], o:+k[1], h:+k[2], l:+k[3], c:+k[4], v:+k[5]
    }));
  }

  async function fetch24h(){
    const res = await fetch(`https://api.binance.com/api/v3/ticker/24hr?symbol=${symbolNow()}`);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  }

  // ---------- INDICATORS ----------
  function highLow(arr, i, period, key){
    let lo = Infinity, hi = -Infinity;
    for(let j = Math.max(0, i-period+1); j <= i; j++){
      hi = Math.max(hi, arr[j].h);
      lo = Math.min(lo, arr[j].l);
    }
    return {hi, lo};
  }

  function computeIchimoku(candles){
    const out = [];
    for(let i=0;i<candles.length;i++){
      const t9 = highLow(candles, i, 9);
      const t26 = highLow(candles, i, 26);
      const t52 = highLow(candles, i, 52);
      const tenkan = (t9.hi + t9.lo)/2;
      const kijun = (t26.hi + t26.lo)/2;
      const senkouA_raw = (tenkan + kijun)/2;
      const senkouB_raw = (t52.hi + t52.lo)/2;
      out.push({ tenkan, kijun, senkouA_raw, senkouB_raw });
    }
    // shift senkou forward 26, chikou backward 26
    const n = candles.length;
    const displaced = out.map((d,i)=>({
      tenkan: d.tenkan, kijun: d.kijun,
      senkouA: null, senkouB: null, chikou: null
    }));
    for(let i=0;i<n;i++){
      const fwd = i+26;
      if(fwd < n+26){
        if(!displaced[fwd]) displaced[fwd] = {tenkan:null,kijun:null,senkouA:null,senkouB:null,chikou:null};
      }
    }
    // extend array by 26 future slots
    for(let i=0;i<26;i++) displaced.push({tenkan:null,kijun:null,senkouA:null,senkouB:null,chikou:null});
    for(let i=0;i<n;i++){
      const fwd = i+26;
      displaced[fwd].senkouA = out[i].senkouA_raw;
      displaced[fwd].senkouB = out[i].senkouB_raw;
    }
    for(let i=26;i<n;i++){
      displaced[i-26].chikou = candles[i].c;
    }
    return displaced; // length n+26
  }

  function computeEMA(candles, period){
    const k = 2/(period+1);
    const out = [];
    let prev = null;
    for(let i=0;i<candles.length;i++){
      const c = candles[i].c;
      if(i < period-1){ out.push(null); continue; }
      if(prev === null){
        let sum=0; for(let j=i-period+1;j<=i;j++) sum+=candles[j].c;
        prev = sum/period;
      } else {
        prev = c*k + prev*(1-k);
      }
      out.push(prev);
    }
    return out;
  }

  function computeRSI(candles, period=14){
    const out = new Array(candles.length).fill(null);
    let gains=0, losses=0;
    for(let i=1;i<candles.length;i++){
      const diff = candles[i].c - candles[i-1].c;
      const gain = diff>0?diff:0, loss = diff<0?-diff:0;
      if(i <= period){
        gains += gain; losses += loss;
        if(i===period){
          let avgG=gains/period, avgL=losses/period;
          out[i] = avgL===0?100:100-(100/(1+avgG/avgL));
          out._avgG=avgG; out._avgL=avgL;
        }
      } else {
        out._avgG = (out._avgG*(period-1)+gain)/period;
        out._avgL = (out._avgL*(period-1)+loss)/period;
        out[i] = out._avgL===0?100:100-(100/(1+out._avgG/out._avgL));
      }
    }
    return out;
  }

  // ---------- RENDER HELPERS ----------
  function fmt(n, d=2){
    if(n===null||n===undefined||isNaN(n)) return '—';
    return n.toLocaleString('en-US', {minimumFractionDigits:d, maximumFractionDigits:d});
  }
  function fmtCompact(n){
    if(n===null||n===undefined) return '—';
    if(n>=1e9) return (n/1e9).toFixed(2)+'B';
    if(n>=1e6) return (n/1e6).toFixed(2)+'M';
    if(n>=1e3) return (n/1e3).toFixed(1)+'K';
    return n.toFixed(2);
  }

  function setupCanvas(canvas, ctx){
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    return { w: rect.width, h: rect.height };
  }

  // ---------- MAIN DRAW ----------
  const PAD = { l:8, r:56, t:14, b:20 };
  const VOL_H_RATIO = 0.16;

  function draw(){
    if(!state.candles.length) return;
    const dims = setupCanvas(priceCanvas, pctx);
    drawPrice(dims);
    if(state.show.rsi){
      rsiCanvas.style.display = 'block';
      rsiLabel.style.display = 'block';
      const rdims = setupCanvas(rsiCanvas, rctx);
      drawRSI(rdims);
    } else {
      rsiCanvas.style.display = 'none';
      rsiLabel.style.display = 'none';
    }
  }

  let visibleRange = { start: 0, end: 0 }; // indices into extended (ichimoku-length) series
  let xScale = null, yScale = null;

  function drawPrice(dims){
    const {w,h} = dims;
    pctx.clearRect(0,0,w,h);

    const n = state.candles.length;
    const ichi = state.ichimoku; // length n+26

    // ---- zoom / pan window ----
    const viewCount = Math.max(25, Math.min(state.viewCount, n));
    const viewEnd = Math.max(viewCount-1, Math.min(state.viewEnd || n-1, n-1));
    state.viewEnd = viewEnd; state.viewCount = viewCount;
    const start = Math.max(0, viewEnd - viewCount + 1);
    const showFuture = (state.show.ichimoku && viewEnd >= n-1) ? 26 : 0;
    const end = viewEnd + 1 + showFuture; // extended index, exclusive
    visibleRange = {start, end, viewEnd};

    const chartH = state.show.vol ? h*(1-VOL_H_RATIO) : h;
    const volTop = chartH;
    const volH = h - chartH - 4;

    // price range across visible candles + cloud
    let pmin = Infinity, pmax = -Infinity;
    for(let i=start;i<=viewEnd;i++){
      pmin = Math.min(pmin, state.candles[i].l);
      pmax = Math.max(pmax, state.candles[i].h);
    }
    if(state.show.ichimoku){
      for(let i=start;i<end;i++){
        const d = ichi[i];
        if(!d) continue;
        [d.tenkan,d.kijun,d.senkouA,d.senkouB,d.chikou].forEach(v=>{
          if(v!==null && v!==undefined){ pmin=Math.min(pmin,v); pmax=Math.max(pmax,v); }
        });
      }
    }
    if(state.show.ema){
      for(let i=start;i<=viewEnd;i++){
        if(state.ema20[i]!=null){ pmin=Math.min(pmin,state.ema20[i]); pmax=Math.max(pmax,state.ema20[i]); }
        if(state.ema50[i]!=null){ pmin=Math.min(pmin,state.ema50[i]); pmax=Math.max(pmax,state.ema50[i]); }
      }
    }
    const pad = (pmax-pmin)*0.06;
    pmin -= pad; pmax += pad;
    currentPmin = pmin; currentPmax = pmax; currentChartH = chartH;

    const nBars = end - start;
    const barSlot = (w - PAD.l - PAD.r) / nBars;
    const bodyW = Math.max(1.5, barSlot*0.62);

    xScale = i => PAD.l + (i-start)*barSlot + barSlot/2;
    yScale = p => PAD.t + (chartH-PAD.t-PAD.b) * (1 - (p-pmin)/(pmax-pmin));

    // grid
    pctx.strokeStyle = '#141b21';
    pctx.lineWidth = 1;
    const gridLines = 5;
    pctx.font = '10px IBM Plex Mono';
    for(let i=0;i<=gridLines;i++){
      const py = PAD.t + (chartH-PAD.t-PAD.b)*i/gridLines;
      pctx.beginPath();
      pctx.moveTo(PAD.l, py); pctx.lineTo(w-PAD.r, py);
      pctx.stroke();
      const priceAt = pmax - (pmax-pmin)*i/gridLines;
      pctx.fillStyle = '#5f7381';
      pctx.fillText(fmt(priceAt,0), w-PAD.r+6, py+3);
    }

    // separator between current data and future cloud
    if(showFuture>0){
      const sepX = xScale(viewEnd+1) - barSlot/2;
      pctx.strokeStyle = '#232d36';
      pctx.setLineDash([3,3]);
      pctx.beginPath(); pctx.moveTo(sepX, PAD.t); pctx.lineTo(sepX, chartH-PAD.b); pctx.stroke();
      pctx.setLineDash([]);
    }

    // ---- Ichimoku cloud fill ----
    if(state.show.ichimoku){
      pctx.beginPath();
      let started = false;
      for(let i=start;i<end;i++){
        const d = ichi[i];
        if(!d || d.senkouA==null) continue;
        const x = xScale(i), y = yScale(d.senkouA);
        if(!started){ pctx.moveTo(x,y); started=true; } else pctx.lineTo(x,y);
      }
      for(let i=end-1;i>=start;i--){
        const d = ichi[i];
        if(!d || d.senkouB==null) continue;
        pctx.lineTo(xScale(i), yScale(d.senkouB));
      }
      pctx.closePath();
      const lastCloud = ichi[end-1];
      const bullish = lastCloud && lastCloud.senkouA >= lastCloud.senkouB;
      pctx.fillStyle = bullish ? 'rgba(0,255,157,0.09)' : 'rgba(255,77,94,0.09)';
      pctx.fill();

      // cloud borders
      drawLine(ichi, start, end, d=>d.senkouA, bullish? 'rgba(0,255,157,0.5)':'rgba(255,77,94,0.35)', 1);
      drawLine(ichi, start, end, d=>d.senkouB, bullish? 'rgba(255,77,94,0.35)':'rgba(0,255,157,0.5)', 1);

      // tenkan / kijun
      drawLine(ichi, start, (viewEnd+1), d=>d.tenkan, '#35c7ff', 1.3);
      drawLine(ichi, start, (viewEnd+1), d=>d.kijun, '#ffb020', 1.3);
      // chikou (dashed)
      pctx.save();
      pctx.setLineDash([4,3]);
      drawLine(ichi, start, (viewEnd+1), d=>d.chikou, '#a78bfa', 1);
      pctx.restore();
    }

    // ---- EMA ----
    if(state.show.ema){
      drawSeriesLine(state.ema20, start, viewEnd+1, '#a78bfa', 1.1, xScale, yScale);
      drawSeriesLine(state.ema50, start, viewEnd+1, '#6d5bd0', 1.1, xScale, yScale);
    }

    // ---- Candles ----
    for(let i=start;i<=viewEnd;i++){
      const c = state.candles[i];
      const x = xScale(i);
      const yO = yScale(c.o), yC = yScale(c.c), yH = yScale(c.h), yL = yScale(c.l);
      const up = c.c >= c.o;
      const col = up ? '#00ff9d' : '#ff4d5e';
      pctx.strokeStyle = col;
      pctx.fillStyle = col;
      pctx.lineWidth = 1;
      pctx.beginPath();
      pctx.moveTo(x, yH); pctx.lineTo(x, yL);
      pctx.stroke();
      const bodyTop = Math.min(yO,yC), bodyH = Math.max(1, Math.abs(yC-yO));
      pctx.fillRect(x-bodyW/2, bodyTop, bodyW, bodyH);
    }

    // ---- Volume ----
    if(state.show.vol){
      let vmax = 0;
      for(let i=start;i<=viewEnd;i++) vmax = Math.max(vmax, state.candles[i].v);
      for(let i=start;i<=viewEnd;i++){
        const c = state.candles[i];
        const x = xScale(i);
        const vh = (c.v/vmax) * (volH-4);
        const up = c.c >= c.o;
        pctx.fillStyle = up ? 'rgba(0,255,157,0.35)' : 'rgba(255,77,94,0.35)';
        pctx.fillRect(x-bodyW/2, h-vh-2, bodyW, vh);
      }
    }

    // current price line
    const lastC = state.candles[n-1];
    const ly = yScale(lastC.c);
    if(ly >= PAD.t-1 && ly <= chartH-PAD.b+1){
      pctx.strokeStyle = '#5f7381';
      pctx.setLineDash([2,3]);
      pctx.beginPath(); pctx.moveTo(PAD.l, ly); pctx.lineTo(w-PAD.r, ly); pctx.stroke();
      pctx.setLineDash([]);
      pctx.fillStyle = lastC.c >= state.candles[n-2].c ? '#00ff9d' : '#ff4d5e';
      pctx.fillRect(w-PAD.r, ly-8, PAD.r, 16);
      pctx.fillStyle = '#05080a';
      pctx.font = 'bold 10px IBM Plex Mono';
      pctx.fillText(fmt(lastC.c,0), w-PAD.r+5, ly+3);
    }

    // ---- Support / Resistance lines (user-drawn) ----
    state.lines.forEach(line=>{
      const y = yScale(line.price);
      if(y < PAD.t-40 || y > chartH-PAD.b+40) return;
      const active = line.id===hoverLineId || line.id===draggingLineId;
      pctx.strokeStyle = active ? '#ffe27a' : '#ffb020';
      pctx.lineWidth = active ? 2.2 : 1.3;
      pctx.setLineDash([7,4]);
      pctx.beginPath(); pctx.moveTo(PAD.l, y); pctx.lineTo(w-PAD.r, y); pctx.stroke();
      pctx.setLineDash([]);
      const label = fmt(line.price,1);
      pctx.font = 'bold 10px IBM Plex Mono';
      const tw = pctx.measureText(label).width;
      pctx.fillStyle = active ? '#ffe27a' : '#ffb020';
      pctx.fillRect(PAD.l, y-9, tw+10, 16);
      pctx.fillStyle = '#05080a';
      pctx.fillText(label, PAD.l+5, y+3);
    });

    // ---- Prix de revient (ligne flashy, verrouillable) ----
    if(state.costLine){
      const price = state.costLine.price;
      const y = yScale(price);
      if(y >= PAD.t-40 && y <= chartH-PAD.b+40){
        const flashy = '#ff2fd6';
        const dragging = draggingCost;
        pctx.save();
        pctx.shadowColor = flashy;
        pctx.shadowBlur = dragging ? 14 : 9;
        pctx.strokeStyle = flashy;
        pctx.lineWidth = dragging ? 2.6 : 2;
        pctx.setLineDash([2,3]);
        pctx.beginPath(); pctx.moveTo(PAD.l, y); pctx.lineTo(w-PAD.r, y); pctx.stroke();
        pctx.setLineDash([]);
        pctx.restore();

        const lockIcon = state.costLine.locked ? '🔒 ' : '';
        const label = lockIcon + 'P.R. ' + fmt(price,1);
        pctx.font = 'bold 10px IBM Plex Mono';
        const tw = pctx.measureText(label).width;
        pctx.fillStyle = flashy;
        pctx.fillRect(PAD.l, y-9, tw+14, 16);
        pctx.fillStyle = '#05080a';
        pctx.fillText(label, PAD.l+6, y+3);
      }
    }

    // ---- Dessins libres (main levée) ----
    const strokeToDraw = [...state.freehandStrokes];
    if(isFreehandDrawing && currentStroke) strokeToDraw.push(currentStroke);
    strokeToDraw.forEach(stroke=>{
      if(stroke.length < 2) return;
      pctx.strokeStyle = '#35c7ff';
      pctx.lineWidth = 1.8;
      pctx.lineJoin = 'round';
      pctx.lineCap = 'round';
      pctx.beginPath();
      stroke.forEach((pt,i)=>{
        const x = PAD.l + (pt.idx-start)*barSlot + barSlot/2;
        const y = yScale(pt.price);
        if(i===0) pctx.moveTo(x,y); else pctx.lineTo(x,y);
      });
      pctx.stroke();
    });

    // ---- Règle de mesure (% entre deux points) ----
    const measureToDraw = isMeasuring && measureStart && measureEnd
      ? { start: measureStart, end: measureEnd }
      : state.measurement;
    if(measureToDraw){
      const a = measureToDraw.start, b = measureToDraw.end;
      const ax = PAD.l + (a.idx-start)*barSlot + barSlot/2, ay = yScale(a.price);
      const bx = PAD.l + (b.idx-start)*barSlot + barSlot/2, by = yScale(b.price);
      const pct = a.price !== 0 ? ((b.price - a.price) / a.price) * 100 : 0;
      const diff = b.price - a.price;
      const positive = diff >= 0;
      const col = positive ? '#00ff9d' : '#ff4d5e';

      pctx.strokeStyle = col;
      pctx.lineWidth = 1.6;
      pctx.setLineDash([5,4]);
      pctx.beginPath(); pctx.moveTo(ax,ay); pctx.lineTo(bx,by); pctx.stroke();
      pctx.setLineDash([]);

      [[ax,ay],[bx,by]].forEach(([px,py])=>{
        pctx.fillStyle = col;
        pctx.beginPath(); pctx.arc(px,py,3.5,0,Math.PI*2); pctx.fill();
      });

      const label = `${positive?'+':''}${pct.toFixed(2)}%  (${positive?'+':''}${fmt(diff,1)})`;
      pctx.font = 'bold 11px IBM Plex Mono';
      const tw = pctx.measureText(label).width;
      const lx = Math.min(Math.max((ax+bx)/2 - tw/2 - 8, PAD.l), w-PAD.r-tw-16);
      const ly2 = Math.min(ay,by) - 22;
      pctx.fillStyle = col;
      pctx.fillRect(lx, ly2, tw+16, 20);
      pctx.fillStyle = '#05080a';
      pctx.fillText(label, lx+8, ly2+14);
    }

    // hover crosshair
    if(state.hoverIdx!=null && state.hoverIdx>=start && state.hoverIdx<=viewEnd){
      const i = state.hoverIdx;
      const c = state.candles[i];
      const x = xScale(i);
      pctx.strokeStyle = '#3a4753';
      pctx.beginPath(); pctx.moveTo(x, PAD.t); pctx.lineTo(x, chartH-PAD.b); pctx.stroke();
    }
  }

  function drawLine(arr, start, end, accessor, color, width){
    pctx.strokeStyle = color; pctx.lineWidth = width;
    pctx.beginPath();
    let started = false;
    for(let i=start;i<end;i++){
      const d = arr[i];
      const v = d ? accessor(d) : null;
      if(v==null){ started=false; continue; }
      const x = xScale(i), y = yScale(v);
      if(!started){ pctx.moveTo(x,y); started=true; } else pctx.lineTo(x,y);
    }
    pctx.stroke();
  }
  function drawSeriesLine(arr, start, end, color, width, xs, ys){
    pctx.strokeStyle = color; pctx.lineWidth = width;
    pctx.beginPath();
    let started = false;
    for(let i=start;i<end;i++){
      const v = arr[i];
      if(v==null){ started=false; continue; }
      const x = xs(i), y = ys(v);
      if(!started){ pctx.moveTo(x,y); started=true; } else pctx.lineTo(x,y);
    }
    pctx.stroke();
  }

  function drawRSI(dims){
    const {w,h} = dims;
    rctx.clearRect(0,0,w,h);
    const start = visibleRange.start;
    const viewEnd = visibleRange.viewEnd;
    const n = state.candles.length;
    const pad = {l:8,r:56,t:8,b:8};
    const ys = v => pad.t + (h-pad.t-pad.b)*(1-v/100);
    // bands
    rctx.strokeStyle = '#141b21'; rctx.lineWidth=1;
    [30,50,70].forEach(v=>{
      rctx.beginPath(); rctx.moveTo(pad.l, ys(v)); rctx.lineTo(w-pad.r, ys(v)); rctx.stroke();
      rctx.fillStyle = '#3a4753'; rctx.font='9px IBM Plex Mono';
      rctx.fillText(v, w-pad.r+6, ys(v)+3);
    });
    rctx.strokeStyle = '#35c7ff'; rctx.lineWidth=1.3;
    rctx.beginPath();
    let started=false;
    for(let i=start;i<=viewEnd;i++){
      const v = state.rsi[i];
      if(v==null){ started=false; continue; }
      const x = xScale ? xScale(i) : 0;
      const y = ys(v);
      if(!started){ rctx.moveTo(x,y); started=true; } else rctx.lineTo(x,y);
    }
    rctx.stroke();
    const lastRsi = state.rsi[n-1];
    if(lastRsi!=null){
      rctx.fillStyle = lastRsi>70? '#ff4d5e' : lastRsi<30? '#00ff9d' : '#5f7381';
      rctx.font='bold 10px IBM Plex Mono';
      rctx.fillText(lastRsi.toFixed(1), 12, 14);
    }
  }

  // ---------- INTERACTION ----------

  function priceFromY(y){
    return currentPmax - (currentPmax-currentPmin) * (y-PAD.t) / (currentChartH-PAD.t-PAD.b);
  }
  function findLineNear(my, threshold){
    threshold = threshold || 7;
    let best = null, bestDist = Infinity;
    state.lines.forEach(line=>{
      const y = PAD.t + (currentChartH-PAD.t-PAD.b) * (1 - (line.price-currentPmin)/(currentPmax-currentPmin));
      const dist = Math.abs(y-my);
      if(dist < threshold && dist < bestDist){ best = line; bestDist = dist; }
    });
    return best;
  }
  function findCostLineNear(my, threshold){
    threshold = threshold || 7;
    if(!state.costLine || state.costLine.locked) return false;
    const y = PAD.t + (currentChartH-PAD.t-PAD.b) * (1 - (state.costLine.price-currentPmin)/(currentPmax-currentPmin));
    return Math.abs(y-my) < threshold;
  }
  function updateCanvasCursor(){
    priceCanvas.style.cursor = draggingLineId!=null ? 'ns-resize'
      : draggingCost ? 'ns-resize'
      : hoverLineId!=null ? 'ns-resize'
      : state.measureMode ? 'crosshair'
      : state.freehandMode ? 'crosshair'
      : state.drawMode ? 'crosshair'
      : state.costMode ? 'crosshair'
      : isPanning ? 'grabbing' : 'grab';
  }

  // convertit une position pixel (x) du canvas en index de bougie fractionnaire (repère données)
  function idxFromX(mx){
    const barSlot = (visibleRange.end - visibleRange.start) > 0
      ? (priceCanvas.getBoundingClientRect().width - PAD.l - PAD.r) / (visibleRange.end - visibleRange.start)
      : 1;
    return visibleRange.start + (mx - PAD.l - barSlot/2) / barSlot;
  }

  function renderLineList(){
    const row = document.getElementById('linesRow');
    const chips = document.getElementById('linesChips');
    if(!state.lines.length){ row.classList.add('empty'); chips.innerHTML=''; return; }
    row.classList.remove('empty');
    const sorted = [...state.lines].sort((a,b)=>b.price-a.price);
    chips.innerHTML = sorted.map(l => `
      <span class="line-chip" data-id="${l.id}">${fmt(l.price,1)}<button data-del="${l.id}" title="Supprimer">×</button></span>
    `).join('');
    chips.querySelectorAll('button[data-del]').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const id = +btn.dataset.del;
        state.lines = state.lines.filter(l=>l.id!==id);
        saveLines();
        renderLineList(); draw();
      });
    });
  }

  function renderCostLine(){
    const row = document.getElementById('costRow');
    const wrap = document.getElementById('costChipWrap');
    if(!state.costLine){ row.classList.add('empty'); wrap.innerHTML=''; return; }
    row.classList.remove('empty');
    const locked = state.costLine.locked;
    wrap.innerHTML = `
      <span class="line-chip cost-chip">${fmt(state.costLine.price,1)}
        <button data-action="lock" class="lock-btn${locked?' locked':''}" title="${locked?'Déverrouiller':'Verrouiller'}">${locked?'🔒':'🔓'}</button>
        <button data-action="del" title="Supprimer">×</button>
      </span>`;
    wrap.querySelector('[data-action="lock"]').addEventListener('click', ()=>{
      state.costLine.locked = !state.costLine.locked;
      saveCostLine();
      renderCostLine();
      draw();
    });
    wrap.querySelector('[data-action="del"]').addEventListener('click', ()=>{
      state.costLine = null;
      saveCostLine();
      renderCostLine();
      draw();
    });
  }

  priceCanvas.addEventListener('mousedown', (e)=>{
    if(!xScale || !state.candles.length) return;
    const rect = priceCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if(state.measureMode){
      isMeasuring = true;
      measureStart = { idx: idxFromX(mx), price: priceFromY(my) };
      measureEnd = measureStart;
      draw();
      return;
    }

    if(state.freehandMode){
      isFreehandDrawing = true;
      currentStroke = [{ idx: idxFromX(mx), price: priceFromY(my) }];
      draw();
      return;
    }

    const hit = findLineNear(my);
    if(hit){
      draggingLineId = hit.id;
      updateCanvasCursor();
      return;
    }
    if(findCostLineNear(my)){
      draggingCost = true;
      updateCanvasCursor();
      return;
    }
    if(state.drawMode){
      const price = priceFromY(my);
      state.lines.push({ id: state.nextLineId++, price });
      saveLines();
      renderLineList();
      draw();
      return;
    }
    if(state.costMode){
      if(state.costLine && state.costLine.locked) return;
      const price = priceFromY(my);
      state.costLine = { price, locked: state.costLine ? state.costLine.locked : false };
      saveCostLine();
      renderCostLine();
      draw();
      return;
    }
    isPanning = true;
    panStartX = e.clientX - rect.left;
    panStartViewEnd = state.viewEnd;
    updateCanvasCursor();
  });

  priceCanvas.addEventListener('mousemove', (e)=>{
    if(!xScale || !state.candles.length) return;
    const rect = priceCanvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const n = state.candles.length;

    if(isMeasuring){
      measureEnd = { idx: idxFromX(mx), price: priceFromY(my) };
      draw();
      return;
    }

    if(isFreehandDrawing){
      currentStroke.push({ idx: idxFromX(mx), price: priceFromY(my) });
      draw();
      return;
    }

    if(draggingCost){
      if(state.costLine && !state.costLine.locked){
        state.costLine.price = priceFromY(my);
        draw();
      }
      return;
    }

    if(draggingLineId!=null){
      const line = state.lines.find(l=>l.id===draggingLineId);
      if(line){ line.price = priceFromY(my); draw(); }
      return;
    }
    if(isPanning){
      const barSlot = (rect.width - PAD.l - PAD.r) / (visibleRange.end - visibleRange.start);
      const dx = mx - panStartX;
      let newViewEnd = panStartViewEnd - Math.round(dx/barSlot);
      newViewEnd = Math.max(state.viewCount-1, Math.min(n-1, newViewEnd));
      state.viewEnd = newViewEnd;
      draw();
      return;
    }

    const hit = findLineNear(my);
    hoverLineId = hit ? hit.id : null;
    updateCanvasCursor();

    const barSlot = (rect.width - PAD.l - PAD.r) / (visibleRange.end - visibleRange.start);
    let idx = Math.round((mx - PAD.l - barSlot/2)/barSlot) + visibleRange.start;
    idx = Math.max(visibleRange.start, Math.min(visibleRange.viewEnd, idx));
    state.hoverIdx = idx;
    draw();
    const c = state.candles[idx];
    const d = state.ichimoku[idx];
    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(mx+16, rect.width-190) + 'px';
    tooltip.style.top = Math.max(my-10,0) + 'px';
    tooltip.innerHTML = `
      <div>${new Date(c.t).toLocaleString('fr-FR')}</div>
      <div class="row"><span>O</span><b>${fmt(c.o,1)}</b></div>
      <div class="row"><span>H</span><b>${fmt(c.h,1)}</b></div>
      <div class="row"><span>L</span><b>${fmt(c.l,1)}</b></div>
      <div class="row"><span>C</span><b>${fmt(c.c,1)}</b></div>
      <div class="row"><span>Vol</span><b>${fmtCompact(c.v)}</b></div>
      ${state.show.ichimoku && d ? `
      <div class="row" style="margin-top:4px;"><span style="color:#35c7ff">Tenkan</span><b>${fmt(d.tenkan,1)}</b></div>
      <div class="row"><span style="color:#ffb020">Kijun</span><b>${fmt(d.kijun,1)}</b></div>` : ''}
      ${state.rsi[idx]!=null ? `<div class="row"><span>RSI</span><b>${state.rsi[idx].toFixed(1)}</b></div>` : ''}
    `;
  });

  window.addEventListener('mouseup', ()=>{
    if(isMeasuring){
      isMeasuring = false;
      if(measureStart && measureEnd) state.measurement = { start: measureStart, end: measureEnd };
      measureStart = null; measureEnd = null;
      draw();
    }
    if(isFreehandDrawing){
      isFreehandDrawing = false;
      if(currentStroke && currentStroke.length > 1){
        state.freehandStrokes.push(currentStroke);
        saveFreehand();
      }
      currentStroke = null;
      draw();
    }
    if(isPanning || draggingLineId!=null){
      isPanning = false;
      if(draggingLineId!=null) saveLines();
      draggingLineId = null;
      updateCanvasCursor();
      if(state.lines.length) renderLineList();
    }
    if(draggingCost){
      draggingCost = false;
      saveCostLine();
      renderCostLine();
      updateCanvasCursor();
    }
  });

  priceCanvas.addEventListener('mouseleave', ()=>{
    state.hoverIdx = null; tooltip.style.display='none';
    if(!isPanning) hoverLineId = null;
    if(isFreehandDrawing){
      isFreehandDrawing = false;
      if(currentStroke && currentStroke.length > 1){
        state.freehandStrokes.push(currentStroke);
        saveFreehand();
      }
      currentStroke = null;
    }
    if(isMeasuring){
      isMeasuring = false;
      if(measureStart && measureEnd) state.measurement = { start: measureStart, end: measureEnd };
      measureStart = null; measureEnd = null;
    }
    draw();
  });

  priceCanvas.addEventListener('contextmenu', (e)=>{
    const rect = priceCanvas.getBoundingClientRect();
    const my = e.clientY - rect.top;
    const hit = findLineNear(my);
    if(hit){
      e.preventDefault();
      state.lines = state.lines.filter(l=>l.id!==hit.id);
      saveLines();
      renderLineList();
      draw();
      return;
    }
    if(state.measurement){
      e.preventDefault();
      state.measurement = null;
      draw();
    }
  });

  priceCanvas.addEventListener('wheel', (e)=>{
    if(!state.candles.length) return;
    e.preventDefault();
    const n = state.candles.length;
    const zoomFactor = e.deltaY > 0 ? 1.15 : 1/1.15;
    let newCount = Math.round(state.viewCount * zoomFactor);
    newCount = Math.max(25, Math.min(n, newCount));
    state.viewCount = newCount;
    state.viewEnd = Math.max(newCount-1, Math.min(state.viewEnd, n-1));
    draw();
  }, {passive:false});

  // touch: single-finger drag pans the chart
  let touchStartX = 0, touchStartViewEnd = 0;
  priceCanvas.addEventListener('touchstart', (e)=>{
    if(e.touches.length!==1 || !state.candles.length) return;
    touchStartX = e.touches[0].clientX;
    touchStartViewEnd = state.viewEnd;
  }, {passive:true});
  priceCanvas.addEventListener('touchmove', (e)=>{
    if(e.touches.length!==1 || !state.candles.length || !visibleRange.end) return;
    const rect = priceCanvas.getBoundingClientRect();
    const barSlot = (rect.width - PAD.l - PAD.r) / (visibleRange.end - visibleRange.start);
    const dx = e.touches[0].clientX - touchStartX;
    const n = state.candles.length;
    let newViewEnd = touchStartViewEnd - Math.round(dx/barSlot);
    newViewEnd = Math.max(state.viewCount-1, Math.min(n-1, newViewEnd));
    state.viewEnd = newViewEnd;
    draw();
  }, {passive:true});

  // ---------- CONTROLS ----------
  document.getElementById('quoteToggle').addEventListener('click', (e)=>{
    const btn = e.target.closest('button.qt');
    if(!btn || btn.classList.contains('active')) return;
    document.querySelectorAll('button.qt').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.quote = btn.dataset.q;
    document.getElementById('pairTitle').textContent = 'BTC / ' + (state.quote==='EUR' ? 'EUR' : 'USDT');
    load();
  });

  document.getElementById('tfGroup').addEventListener('click', (e)=>{
    const btn = e.target.closest('button.tf');
    if(!btn) return;
    document.querySelectorAll('button.tf').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    state.tf = btn.dataset.tf;
    load();
  });

  function bindToggle(id, key){
    const el = document.getElementById(id);
    const input = el.querySelector('input');
    el.addEventListener('click', (e)=>{
      if(e.target !== input) input.checked = !input.checked;
      state.show[key] = input.checked;
      el.classList.toggle('on', input.checked);
      draw();
    });
  }
  bindToggle('tgIchimoku','ichimoku');
  bindToggle('tgEma','ema');
  bindToggle('tgRsi','rsi');
  bindToggle('tgVol','vol');

  document.getElementById('drawBtn').addEventListener('click', ()=>{
    state.drawMode = !state.drawMode;
    if(state.drawMode){
      state.freehandMode = false; state.measureMode = false; state.costMode = false;
      document.getElementById('freehandBtn').classList.remove('active');
      document.getElementById('measureBtn').classList.remove('active');
      document.getElementById('costBtn').classList.remove('active');
    }
    document.getElementById('drawBtn').classList.toggle('active', state.drawMode);
    updateCanvasCursor();
  });
  document.getElementById('freehandBtn').addEventListener('click', ()=>{
    state.freehandMode = !state.freehandMode;
    if(state.freehandMode){
      state.drawMode = false; state.measureMode = false; state.costMode = false;
      document.getElementById('drawBtn').classList.remove('active');
      document.getElementById('measureBtn').classList.remove('active');
      document.getElementById('costBtn').classList.remove('active');
    }
    document.getElementById('freehandBtn').classList.toggle('active', state.freehandMode);
    updateCanvasCursor();
  });
  document.getElementById('measureBtn').addEventListener('click', ()=>{
    state.measureMode = !state.measureMode;
    if(state.measureMode){
      state.drawMode = false; state.freehandMode = false; state.costMode = false;
      document.getElementById('drawBtn').classList.remove('active');
      document.getElementById('freehandBtn').classList.remove('active');
      document.getElementById('costBtn').classList.remove('active');
    }
    document.getElementById('measureBtn').classList.toggle('active', state.measureMode);
    updateCanvasCursor();
  });
  document.getElementById('costBtn').addEventListener('click', ()=>{
    state.costMode = !state.costMode;
    if(state.costMode){
      state.drawMode = false; state.freehandMode = false; state.measureMode = false;
      document.getElementById('drawBtn').classList.remove('active');
      document.getElementById('freehandBtn').classList.remove('active');
      document.getElementById('measureBtn').classList.remove('active');
    }
    document.getElementById('costBtn').classList.toggle('active', state.costMode);
    updateCanvasCursor();
  });
  document.getElementById('clearFreehandBtn').addEventListener('click', ()=>{
    state.freehandStrokes = [];
    saveFreehand();
    draw();
  });
  document.getElementById('zoomInBtn').addEventListener('click', ()=>{
    if(!state.candles.length) return;
    state.viewCount = Math.max(25, Math.round(state.viewCount/1.4));
    draw();
  });
  document.getElementById('zoomOutBtn').addEventListener('click', ()=>{
    if(!state.candles.length) return;
    state.viewCount = Math.min(state.candles.length, Math.round(state.viewCount*1.4));
    draw();
  });
  document.getElementById('resetViewBtn').addEventListener('click', ()=>{
    if(!state.candles.length) return;
    state.viewCount = Math.min(140, state.candles.length);
    state.viewEnd = state.candles.length - 1;
    draw();
  });
  document.getElementById('clearLinesBtn').addEventListener('click', ()=>{
    state.lines = [];
    saveLines();
    renderLineList();
    draw();
  });

  document.getElementById('refreshBtn').addEventListener('click', load);

  window.addEventListener('resize', ()=>{ if(!state.loading) draw(); });

  // ---------- LOAD ----------
  async function load(){
    const btn = document.getElementById('refreshBtn');
    btn.classList.add('loading'); btn.textContent = '⟳ CHARGEMENT…';
    statusEl.classList.remove('hidden');
    statusEl.textContent = 'RÉCUPÉRATION DES DONNÉES BINANCE…';
    state.loading = true;
    const resetView = state.candles.length===0 || state._loadedTf !== state.tf;
    try{
      const [candles, ticker] = await Promise.all([fetchKlines(state.tf), fetch24h()]);
      state.candles = candles;
      state.ichimoku = computeIchimoku(candles);
      state.ema20 = computeEMA(candles, 20);
      state.ema50 = computeEMA(candles, 50);
      state.rsi = computeRSI(candles, 14);
      if(resetView){
        state.viewCount = Math.min(140, candles.length);
        state.viewEnd = candles.length - 1;
      }
      state._loadedTf = state.tf;
      renderLineList();
      renderCostLine();

      const last = candles[candles.length-1];
      const prevClose = +ticker.prevClosePrice;
      const chgPct = +ticker.priceChangePercent;
      const cs = currencySymbol();
      document.getElementById('pxNow').textContent = cs + fmt(last.c,1);
      const chgEl = document.getElementById('pxChg');
      chgEl.textContent = (chgPct>=0?'▲ ':'▼ ') + Math.abs(chgPct).toFixed(2) + '% (24h)';
      chgEl.className = 'chg ' + (chgPct>=0?'up':'down');
      document.getElementById('mH24').textContent = cs+fmt(+ticker.highPrice,0);
      document.getElementById('mL24').textContent = cs+fmt(+ticker.lowPrice,0);
      document.getElementById('mVol').textContent = fmtCompact(+ticker.volume)+' BTC';
      document.getElementById('lastUpdate').textContent = 'Dernière mise à jour : ' + new Date().toLocaleTimeString('fr-FR');

      statusEl.classList.add('hidden');
      draw();
    }catch(err){
      statusEl.textContent = 'ERREUR DE CONNEXION — ' + err.message + ' — RÉESSAI DANS 5S';
      setTimeout(load, 5000);
    }finally{
      state.loading = false;
      btn.classList.remove('loading'); btn.textContent = '⟳ ACTUALISER';
    }
  }

  load();
  // auto-refresh every 60s
  setInterval(()=>{ if(!state.loading) load(); }, 60000);
})();
</script>
</body>
</html>
