<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CONTRÔLE · Mise en plan SolidWorks</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📐</text></svg>">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap');

:root {
  --bg:       #f5f0e8;
  --surface:  #fdf8f0;
  --surface2: #ede8de;
  --border:   #d6cfc0;
  --accent:   #c8760a;
  --accent2:  #a85f06;
  --text:     #3a2e1e;
  --muted:    #8c7d68;
  --gold:     #b8660a;
  --green:    #4a8a5a;
  --red:      #b04040;
  --orange:   #c8760a;
  --grid-color: rgba(120,90,40,0.06);
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body {
  background: var(--bg);
  background-image:
    linear-gradient(var(--grid-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
  background-size: 32px 32px;
  color: var(--text);
  font-family: 'DM Mono', 'Courier New', monospace;
  font-size: 13px;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ═══ HEADER ═══ */
.header {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(245,240,232,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 15px;
  letter-spacing: -0.5px;
  color: var(--accent);
  flex-shrink: 0;
}
.logo span { color: var(--muted); font-weight: 700; }
.header-btns { display: flex; gap: 8px; align-items: center; }
.hbtn {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 7px 12px;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
  transition: all 0.18s;
  min-height: 36px;
}
.hbtn:hover, .hbtn:active { border-color: var(--accent); color: var(--accent); }
.hbtn.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 500; }
.hbtn.primary:hover { background: var(--accent2); border-color: var(--accent2); }
.hbtn.danger { border-color: var(--red); color: var(--red); }
.hbtn.danger:hover { background: rgba(176,64,64,0.08); }

/* ═══ KPIs ═══ */
.kpis-bar {
  display: grid;
  grid-template-columns: repeat(4, minmax(0,1fr));
  gap: 10px;
  padding: 14px 16px;
  max-width: 800px;
  margin: 0 auto;
}
.kpi-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.kpi-val {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 26px;
  line-height: 1;
}
.kpi-lbl {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ═══ PROGRESS ═══ */
.prog-wrap {
  padding: 0 16px 14px;
  max-width: 800px;
  margin: 0 auto;
}
.prog-track {
  height: 6px;
  background: var(--surface2);
  border-radius: 99px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.prog-fill {
  height: 100%;
  border-radius: 99px;
  background: var(--green);
  transition: width .4s ease;
}
.prog-row {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.5px;
}

/* ═══ FILTERS ═══ */
.filters-bar {
  display: flex;
  gap: 6px;
  padding: 0 16px 14px;
  max-width: 800px;
  margin: 0 auto;
  flex-wrap: wrap;
}
.flt {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.5px;
  padding: 5px 14px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  min-height: 32px;
  display: flex;
  align-items: center;
}
.flt:hover { border-color: var(--accent); color: var(--accent); }
.flt.on { background: rgba(200,118,10,0.1); color: var(--accent); border-color: var(--accent2); }

/* ═══ CONTENT ═══ */
.content {
  padding: 0 16px;
  max-width: 800px;
  margin: 0 auto;
}

/* ═══ SECTION ═══ */
.section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  margin-bottom: 12px;
}
.section-head {
  background: var(--surface2);
  padding: 11px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  border-bottom: 1px solid var(--border);
  transition: background 0.15s;
  user-select: none;
}
.section-head:hover { background: rgba(58,68,85,0.7); }
.sec-icon {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  width: 26px;
  text-align: center;
  flex-shrink: 0;
  letter-spacing: 0;
}
.sec-name {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text);
  flex: 1;
}
.sec-prog-wrap {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}
.sec-track {
  width: 72px;
  height: 4px;
  background: var(--border);
  border-radius: 99px;
  overflow: hidden;
}
.sec-fill {
  height: 100%;
  border-radius: 99px;
  transition: width .3s;
}
.sec-pct {
  font-family: 'Syne', sans-serif;
  font-size: 11px;
  font-weight: 700;
  min-width: 32px;
  text-align: right;
}
.sec-chev {
  font-size: 9px;
  color: var(--muted);
  transition: transform 0.2s;
  flex-shrink: 0;
}
.sec-chev.open { transform: rotate(90deg); }

/* ═══ ITEM ═══ */
.item {
  display: flex;
  align-items: center;
  padding: 11px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  gap: 12px;
  transition: background 0.12s;
}
.item:last-child { border-bottom: none; }
.item.st-ok { background: rgba(74,138,90,0.07); }
.item.st-ko { background: rgba(176,64,64,0.07); }
.item.st-na { background: rgba(140,125,104,0.07); }

.item-texts { flex: 1; min-width: 0; }
.item-lbl {
  font-size: 12px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}
.item-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  line-height: 1.4;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* ═══ ACTION BUTTONS ═══ */
.item-btns { display: flex; gap: 4px; flex-shrink: 0; }
.ib {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 5px 11px;
  border-radius: 7px;
  border: 1px solid transparent;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  min-height: 30px;
  display: flex;
  align-items: center;
}
.ib.ok {
  background: rgba(74,138,90,0.1);
  color: var(--green);
  border-color: rgba(74,138,90,0.3);
}
.ib.ok:hover, .ib.ok.on {
  background: var(--green);
  color: #fff;
  border-color: var(--green);
}
.ib.ko {
  background: rgba(176,64,64,0.1);
  color: var(--red);
  border-color: rgba(176,64,64,0.3);
}
.ib.ko:hover, .ib.ko.on {
  background: var(--red);
  color: #fff;
  border-color: var(--red);
}
.ib.na {
  background: rgba(140,125,104,0.1);
  color: var(--muted);
  border-color: rgba(140,125,104,0.3);
}
.ib.na:hover, .ib.na.on {
  background: var(--muted);
  color: #fff;
  border-color: var(--muted);
}

/* ═══ NOTE ROW ═══ */
.note-row {
  padding: 0 16px 10px;
  background: rgba(176,64,64,0.05);
}
.note-row input {
  background: var(--surface);
  border: 1px solid rgba(176,64,64,0.3);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 8px 12px;
  outline: none;
  width: 100%;
  transition: border-color 0.18s;
}
.note-row input:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(176,64,64,0.1);
}
.note-row input::placeholder { color: var(--muted); }

/* ═══ BADGE ═══ */
.badge {
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  padding: 2px 7px;
  border-radius: 4px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
}
.badge.green { background: rgba(74,138,90,0.12); border-color: rgba(74,138,90,0.3); color: var(--green); }
.badge.red   { background: rgba(176,64,64,0.12); border-color: rgba(176,64,64,0.3);  color: var(--red);   }
.badge.gold  { background: rgba(184,102,10,0.12); border-color: rgba(184,102,10,0.3); color: var(--gold); }
.badge.blue  { background: rgba(200,118,10,0.12); border-color: rgba(200,118,10,0.3); color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">CTRL<span>·</span>MEP</div>
  <div class="header-btns">
    <button class="hbtn danger" onclick="resetAll()">↺ Réinitialiser</button>
    <button class="hbtn primary" onclick="sendPrompt('Génère un rapport de contrôle mise en plan SolidWorks avec les non-conformités')">Rapport ↗</button>
  </div>
</div>

<div class="kpis-bar" id="kpis"></div>

<div class="prog-wrap">
  <div class="prog-track"><div class="prog-fill" id="pf" style="width:0%"></div></div>
  <div class="prog-row"><span id="pl">0 / 0 validés</span><span id="pp">0 %</span></div>
</div>

<div class="filters-bar">
  <span class="flt on" onclick="setFilter(this,'all')">Tous</span>
  <span class="flt" onclick="setFilter(this,'none')">Non traités</span>
  <span class="flt" onclick="setFilter(this,'ko')">Non conformes</span>
  <span class="flt" onclick="setFilter(this,'ok')">Conformes</span>
  <span class="flt" onclick="setFilter(this,'na')">N/A</span>
</div>

<div class="content" id="secs"></div>

<script>
const D=[
  {id:"ca",icon:"[]",label:"Cartouche & identification",items:[
    {id:"c1",l:"Numéro de plan",s:"Format normalisé, indice de révision à jour"},
    {id:"c2",l:"Désignation de la pièce",s:"Nom exact selon la nomenclature projet"},
    {id:"c3",l:"Matière",s:"Désignation normalisée : S235JR, 316L, PA6-GF30…"},
    {id:"c4",l:"Traitement de surface / thermique",s:"HRC, cémentation, zingage, peinture RAL…"},
    {id:"c5",l:"Échelle",s:"Mentionnée et cohérente avec la représentation"},
    {id:"c6",l:"Format & orientation de feuille",s:"A0 à A4, paysage ou portrait adapté"},
    {id:"c7",l:"Normes applicables",s:"ISO, ANSI, EN… indiquées dans le cartouche"},
    {id:"c8",l:"Indice de révision & historique",s:"Tableau des révisions renseigné et signé"},
    {id:"c9",l:"Créateur / vérificateur / approbateur",s:"Noms, dates et visa présents"},
  ]},
  {id:"vi",icon:"◫",label:"Vues & représentation",items:[
    {id:"v1",l:"Vues suffisantes",s:"Face, dessus, profil — toute la géométrie décrite"},
    {id:"v2",l:"Projection cohérente",s:"1er ou 3e dièdre uniforme sur tout le plan"},
    {id:"v3",l:"Coupes & sections",s:"Plans A-A, B-B… identifiés, hachures selon norme"},
    {id:"v4",l:"Vues de détail agrandies",s:"Identifiées avec leur propre échelle"},
    {id:"v5",l:"Lignes cachées",s:"Tiretées uniquement si indispensables à la compréhension"},
    {id:"v6",l:"Axes & lignes d'axe",s:"Présents sur révolutions, alésages, symétries"},
    {id:"v7",l:"Vue 3D / isométrique",s:"Informative uniquement, non cotée"},
  ]},
  {id:"co",icon:"↔",label:"Cotation dimensionnelle",items:[
    {id:"d1",l:"Cotation complète",s:"Toutes les dimensions nécessaires à la fab présentes"},
    {id:"d2",l:"Sans redondance",s:"Aucune cote double, pas de sur-cotation"},
    {id:"d3",l:"Tolérances générales",s:"Renvoi ISO 2768-m/f ou tableau personnalisé"},
    {id:"d4",l:"Tolérances spécifiques sur cotes critiques",s:"Mentionnées explicitement"},
    {id:"d5",l:"Cotes de référence",s:"Entre parenthèses si informatives seulement"},
    {id:"d6",l:"Lisibilité",s:"Pas de croisement de cotes, texte orienté lecture courante"},
    {id:"d7",l:"Unités",s:"mm par défaut, cohérentes sur tout le plan"},
  ]},
  {id:"gd",icon:"⊙",label:"Tolérances géométriques (GD&T / GPS)",items:[
    {id:"g1",l:"Références (datums) définies",s:"A, B, C clairement identifiées sur le plan"},
    {id:"g2",l:"Cadres de tolérance corrects",s:"Symbole, valeur, référence dans le bon ordre"},
    {id:"g3",l:"Planéité / rectitude",s:"Sur les surfaces fonctionnelles d'appui"},
    {id:"g4",l:"Circularité / cylindricité",s:"Sur portées d'alésage ou d'arbre"},
    {id:"g5",l:"Perpendicularité / parallélisme",s:"Définis par rapport à un datum"},
    {id:"g6",l:"Localisation / concentricité",s:"Préférés aux cotes +/− pour les positions"},
    {id:"g7",l:"Battement / battement total",s:"Sur surfaces rotatives si nécessaire"},
  ]},
  {id:"es",icon:"Ra",label:"État de surface",items:[
    {id:"s1",l:"Symboles Ra / Rz sur surfaces fonctionnelles",s:"Paliers, joints, glissières, portées…"},
    {id:"s2",l:"État de surface général",s:"Symbole au coin supérieur droit, valeur par défaut"},
    {id:"s3",l:"Cohérence avec le procédé",s:"Ra compatible tournage, rectification, fraisage…"},
  ]},
  {id:"fi",icon:"///",label:"Filetages, alésages & ajustements",items:[
    {id:"f1",l:"Désignation filetage normalisée",s:"M10×1.5-6H, G1/2, UNC… selon norme applicable"},
    {id:"f2",l:"Profondeur de filetage",s:"Longueur utile + longueur de perçage précisées"},
    {id:"f3",l:"Alésages avec tolérance ISO",s:"Ø20 H7 / h6 / k6… système alésage ou arbre"},
    {id:"f4",l:"Ajustements précisés",s:"Jeu / serrage défini pour les assemblages fonctionnels"},
    {id:"f5",l:"Chanfreins & rayons de dégagement",s:"Sur toutes les arêtes saillantes"},
  ]},
  {id:"no",icon:"≡",label:"Nomenclature & assemblage",items:[
    {id:"n1",l:"Repères pointant sur chaque composant",s:"Bulles numérotées, lignes de rappel claires"},
    {id:"n2",l:"Tableau de nomenclature complet",s:"Repère, désignation, qté, matière, référence"},
    {id:"n3",l:"Pièces standard référencées",s:"Vis, roulements, joints — norme ou réf. fournisseur"},
  ]},
  {id:"an",icon:"T",label:"Annotations & notes techniques",items:[
    {id:"a1",l:"Notes générales",s:"Débavurage, marquage, protection, livraison…"},
    {id:"a2",l:"Symboles de soudure",s:"ISO 2553 corrects si soudures présentes"},
    {id:"a3",l:"Cohérence modèle 3D / plan 2D",s:"Cotes plan = cotes SolidWorks, pas de dérive"},
    {id:"a4",l:"Instructions d'assemblage critiques",s:"Sens, couples de serrage si nécessaires"},
  ]},
];

let ST={}, EX={};
D.forEach(s=>{EX[s.id]=true; s.items.forEach(it=>ST[it.id]={v:"none",n:""})});
let filter="all";

function resetAll(){Object.keys(ST).forEach(k=>ST[k]={v:"none",n:""});render();}
function setFilter(el,f){filter=f;document.querySelectorAll(".flt").forEach(x=>x.classList.remove("on"));el.classList.add("on");render();}
function toggleSec(id){EX[id]=!EX[id];render();}
function setV(id,v){ST[id].v=(ST[id].v===v?"none":v);render();}
function setN(id,v){ST[id].n=v;}

function render(){
  const all=D.flatMap(s=>s.items);
  const tot=all.length;
  const nok=all.filter(i=>ST[i.id].v==="ok").length;
  const nko=all.filter(i=>ST[i.id].v==="ko").length;
  const nna=all.filter(i=>ST[i.id].v==="na").length;
  const nnone=all.filter(i=>ST[i.id].v==="none").length;
  const pct=tot>0?Math.round(nok/tot*100):0;

  document.getElementById("kpis").innerHTML=
    `<div class="kpi-card"><div class="kpi-val" style="color:var(--text)">${tot}</div><div class="kpi-lbl">Total</div></div>`+
    `<div class="kpi-card"><div class="kpi-val" style="color:var(--green)">${nok}</div><div class="kpi-lbl">Conformes</div></div>`+
    `<div class="kpi-card"><div class="kpi-val" style="color:var(--red)">${nko}</div><div class="kpi-lbl">Non conform.</div></div>`+
    `<div class="kpi-card"><div class="kpi-val" style="color:var(--muted)">${nnone}</div><div class="kpi-lbl">Non traités</div></div>`;

  document.getElementById("pf").style.width=pct+"%";
  document.getElementById("pf").style.background=nko>0?"var(--red)":pct===100?"var(--green)":"var(--accent)";
  document.getElementById("pl").textContent=nok+" / "+tot+" validés";
  document.getElementById("pp").textContent=pct+" %";

  const wrap=document.getElementById("secs");
  wrap.innerHTML="";

  D.forEach(s=>{
    const vis=s.items.filter(it=>{
      const v=ST[it.id].v;
      if(filter==="all") return true;
      if(filter==="none") return v==="none";
      if(filter==="ko") return v==="ko";
      if(filter==="ok") return v==="ok";
      if(filter==="na") return v==="na";
      return true;
    });
    if(filter!=="all"&&vis.length===0) return;

    const sok=s.items.filter(i=>ST[i.id].v==="ok").length;
    const sko=s.items.filter(i=>ST[i.id].v==="ko").length;
    const spct=Math.round(sok/s.items.length*100);
    const fillColor=sko>0?"var(--red)":sok===s.items.length?"var(--green)":"var(--orange)";
    const pctColor=sko>0?"var(--red)":sok===s.items.length?"var(--green)":"var(--orange)";

    const sec=document.createElement("div");
    sec.className="section";

    const hdr=document.createElement("div");
    hdr.className="section-head";
    hdr.innerHTML=`
      <span class="sec-icon">${s.icon}</span>
      <span class="sec-name">${s.label}</span>
      <div class="sec-prog-wrap">
        <div class="sec-track"><div class="sec-fill" style="width:${spct}%;background:${fillColor}"></div></div>
        <span class="sec-pct" style="color:${pctColor}">${spct}%</span>
      </div>
      <span class="sec-chev ${EX[s.id]?"open":""}">&#9654;</span>`;
    hdr.onclick=()=>toggleSec(s.id);
    sec.appendChild(hdr);

    if(EX[s.id]){
      const iw=document.createElement("div");
      (filter==="all"?s.items:vis).forEach(it=>{
        const v=ST[it.id].v;
        const row=document.createElement("div");
        row.className="item st-"+v;
        row.innerHTML=`
          <div class="item-texts">
            <div class="item-lbl">${it.l}</div>
            <div class="item-sub">${it.s}</div>
          </div>
          <div class="item-btns">
            <button class="ib ok ${v==="ok"?"on":""}" onclick="setV('${it.id}','ok')">OK</button>
            <button class="ib ko ${v==="ko"?"on":""}" onclick="setV('${it.id}','ko')">NC</button>
            <button class="ib na ${v==="na"?"on":""}" onclick="setV('${it.id}','na')">N/A</button>
          </div>`;
        iw.appendChild(row);

        if(v==="ko"){
          const nr=document.createElement("div");
          nr.className="note-row";
          nr.innerHTML=`<input placeholder="Observation sur la non-conformité…" value="${ST[it.id].n}" oninput="setN('${it.id}',this.value)">`;
          iw.appendChild(nr);
        }
      });
      sec.appendChild(iw);
    }
    wrap.appendChild(sec);
  });
}

render();
</script>
</body>
</html>
