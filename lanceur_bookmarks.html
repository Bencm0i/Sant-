<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lanceur — Bookmarks Pro</title>
<style>
  :root {
    --overlay: rgba(0,0,0,0.35);
  }
  html, body {
    margin: 0; height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #1a1a2e;
    transition: background-color .3s;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: linear-gradient(var(--overlay), var(--overlay));
  }
  #launch {
    padding: 22px 48px;
    font-size: 1.4rem;
    font-weight: 600;
    color: #fff;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 14px;
    backdrop-filter: blur(6px);
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  #launch:hover { background: rgba(255,255,255,0.22); }
  #launch:active { transform: scale(0.97); }
  #status {
    color: #eee;
    font-size: 0.9rem;
    min-height: 1.2em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .settings {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.35);
    padding: 10px 14px;
    border-radius: 10px;
    backdrop-filter: blur(4px);
  }
  .settings label {
    color: #fff;
    font-size: 0.8rem;
  }
  .settings input[type="color"] {
    width: 32px; height: 32px; border: none; background: none; cursor: pointer;
  }
  .settings button {
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
  }
  .settings button:hover { background: rgba(255,255,255,0.2); }

  .gallery {
    position: fixed;
    bottom: 64px;
    right: 16px;
    display: flex;
    gap: 8px;
    max-width: 70vw;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .thumb {
    position: relative;
    width: 52px;
    height: 52px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    border: 2px solid rgba(255,255,255,0.4);
    cursor: pointer;
    overflow: hidden;
    transition: border-color .15s, transform .1s;
  }
  .thumb:hover { transform: scale(1.06); }
  .thumb.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.6); }
  .thumb .del {
    position: absolute;
    top: 1px; right: 1px;
    width: 16px; height: 16px;
    line-height: 16px;
    text-align: center;
    font-size: 11px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  .thumb.add {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.4rem;
    background: rgba(255,255,255,0.1);
  }

  #quote {
    max-width: 560px;
    text-align: center;
    padding: 16px 26px;
    color: #fff;
    font-size: 1.15rem;
    font-style: italic;
    line-height: 1.5;
    background: rgba(255,255,255,0.08);
    border-left: 3px solid rgba(255,255,255,0.6);
    border-radius: 8px;
    backdrop-filter: blur(4px);
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
    opacity: 0;
    transform: translateY(6px);
    animation: fadeInQuote .6s ease forwards;
    animation-delay: .15s;
  }
  #quote::before { content: "“ "; }
  #quote::after { content: " ”"; }
  @keyframes fadeInQuote {
    to { opacity: 1; transform: translateY(0); }
  }

  /* --- Panneau expressions --- */
  #exprToggle {
    position: fixed;
    top: 16px;
    right: 16px;
    font-size: 0.8rem;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.35);
    color: #fff;
    cursor: pointer;
    backdrop-filter: blur(4px);
    z-index: 20;
  }
  #exprToggle:hover { background: rgba(0,0,0,0.5); }

  #exprPanel {
    position: fixed;
    top: 58px;
    right: 16px;
    width: min(420px, 90vw);
    max-height: 74vh;
    display: none;
    flex-direction: column;
    gap: 10px;
    background: rgba(20,20,30,0.85);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 14px;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 20;
  }
  #exprPanel.open { display: flex; }
  #exprPanel h3 {
    margin: 0;
    color: #fff;
    font-size: 0.95rem;
    font-weight: 600;
  }
  #exprList {
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    max-height: 40vh;
    padding-right: 4px;
  }
  #exprList::-webkit-scrollbar { width: 6px; }
  #exprList::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 3px; }
  .expr-row {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .expr-row textarea {
    flex: 1;
    resize: vertical;
    min-height: 34px;
    max-height: 120px;
    font-family: inherit;
    font-size: 0.82rem;
    color: #fff;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 6px;
    padding: 6px 8px;
  }
  .expr-row textarea:focus {
    outline: none;
    border-color: rgba(255,255,255,0.6);
  }
  .expr-row .expr-del {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    line-height: 24px;
    text-align: center;
    font-size: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    color: #fff;
    cursor: pointer;
  }
  .expr-row .expr-del:hover { background: rgba(220,60,60,0.6); }
  #exprAddRow {
    display: flex;
    gap: 6px;
  }
  #exprAddRow textarea {
    flex: 1;
    min-height: 34px;
    max-height: 100px;
    resize: vertical;
    font-family: inherit;
    font-size: 0.82rem;
    color: #fff;
    background: rgba(255,255,255,0.06);
    border: 1px dashed rgba(255,255,255,0.35);
    border-radius: 6px;
    padding: 6px 8px;
  }
  #exprAddRow button {
    flex-shrink: 0;
    font-size: 0.78rem;
    padding: 0 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.12);
    color: #fff;
    cursor: pointer;
  }
  #exprAddRow button:hover { background: rgba(255,255,255,0.22); }
  .expr-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-top: 1px solid rgba(255,255,255,0.15);
    padding-top: 10px;
  }
  .expr-actions button, .expr-actions label {
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.35);
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
  }
  .expr-actions button:hover, .expr-actions label:hover { background: rgba(255,255,255,0.2); }
  #exprStatus {
    font-size: 0.72rem;
    color: #ccc;
    min-height: 1.1em;
  }
</style>
</head>
<body>
  <div class="wrap">
    <button id="launch">📑 Ouvrir Bookmarks Pro</button>
    <div id="status"></div>
    <div id="quote"></div>
  </div>

  <button id="exprToggle">💬 Expressions</button>
  <div id="exprPanel">
    <h3>Expressions affichées aléatoirement</h3>
    <div id="exprList"></div>
    <div id="exprAddRow">
      <textarea id="exprNew" placeholder="Nouvelle expression…" rows="2"></textarea>
      <button id="exprAddBtn">+ Ajouter</button>
    </div>
    <div class="expr-actions">
      <button id="exprExport">⬇ Exporter JSON</button>
      <label for="exprImportFile">⬆ Importer JSON</label>
      <input type="file" id="exprImportFile" accept="application/json" style="display:none">
      <button id="exprReset">↺ Réinitialiser</button>
    </div>
    <div id="exprStatus"></div>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="settings">
    <label>Overlay
      <input type="range" id="overlayRange" min="0" max="90" value="35">
    </label>
    <input type="file" id="bgFile" accept="image/*" style="display:none">
    <button id="addBg">+ Ajouter un fond</button>
  </div>

<script>
  const URL_CIBLE = "https://bencm0i.github.io/Sant-/bookmarks_pro.html";
  const WINDOW_NAME = "bookmarksProTab"; // nom fixe : window.open réutilise l'onglet existant

  // --- Expressions (citations) : éditables, persistées en localStorage (JSON) ---
  const DEFAULT_EXPRESSIONS = [
    "On me dit trop curieuse, mais je préfère dire passionnée par les gens.",
    "J'ai l'impression qu'on se connaît depuis toujours, alors que ça fait à peine cinq minutes.",
    "Attention, je suis du genre à me souvenir de tout ce que vous dites — surtout les bêtises.",
    "Rien ne me plaît autant qu'une bonne conversation et un café qui refroidit parce qu'on a trop parlé.",
    "Je ne cherche pas à plaire à tout le monde, juste à être moi-même — et si ça plaît, tant mieux.",
    "Un sourire sincère ouvre plus de portes qu'on ne le croit.",
    "La vraie élégance, c'est de mettre les gens à l'aise sans y penser.",
    "J'aime les silences confortables presque autant que les grandes discussions.",
    "On a qu'une vie, autant la vivre avec un peu de style et beaucoup de sincérité.",
    "Je préfère écouter deux fois plus que je ne parle.",
    "Méfiez-vous des filles discrètes, on a souvent le plus à raconter.",
    "J'aime prendre mon temps... surtout quand ça en vaut la peine.",
    "Ce regard-là, je le garde pour ceux qui savent le mériter.",
    "Je ne suis pas timide, je choisis juste bien mes moments.",
    "Un peu de mystère, c'est toujours plus intéressant qu'un livre ouvert.",
    "J'aime qu'on me surprenne — ça arrive rarement, mais ça arrive.",
    "Il y a une différence entre être sage et être patiente.",
    "Certaines choses se méritent, pas se demandent.",
    "Je souris facilement, mais je ne me livre pas si vite.",
    "On dit que je suis intense — je préfère dire que je vais droit au but."
  ];

  const EXPR_KEY = 'lanceur_expressions';

  function loadExpressions() {
    try {
      const raw = JSON.parse(localStorage.getItem(EXPR_KEY));
      if (Array.isArray(raw) && raw.length) return raw;
    } catch {}
    // Première utilisation : on seed avec les expressions par défaut
    localStorage.setItem(EXPR_KEY, JSON.stringify(DEFAULT_EXPRESSIONS));
    return DEFAULT_EXPRESSIONS.slice();
  }

  function saveExpressions(arr) {
    try {
      localStorage.setItem(EXPR_KEY, JSON.stringify(arr));
      return true;
    } catch (err) {
      console.error(err);
      return false;
    }
  }

  let expressions = loadExpressions();

  const quoteEl = document.getElementById('quote');
  // Une seule tirée aléatoirement à chaque ouverture, on garde celle-ci affichée
  const CURRENT_QUOTE = expressions.length
    ? expressions[Math.floor(Math.random() * expressions.length)]
    : '';
  quoteEl.textContent = CURRENT_QUOTE;

  const statusEl = document.getElementById('status');
  const overlayRange = document.getElementById('overlayRange');
  const bgFile = document.getElementById('bgFile');
  const addBg = document.getElementById('addBg');
  const galleryEl = document.getElementById('gallery');

  // --- Fond d'écran ---
  function applyBg(dataUrl) {
    document.body.style.backgroundImage = dataUrl ? `url(${dataUrl})` : 'none';
  }

  function applyOverlay(val) {
    document.documentElement.style.setProperty('--overlay', `rgba(0,0,0,${val/100})`);
  }

  const savedOverlay = localStorage.getItem('lanceur_overlay');
  if (savedOverlay) { overlayRange.value = savedOverlay; applyOverlay(savedOverlay); }
  else applyOverlay(35);

  overlayRange.addEventListener('input', (e) => {
    localStorage.setItem('lanceur_overlay', e.target.value);
    applyOverlay(e.target.value);
  });

  // --- Bibliothèque de wallpapers (plusieurs fonds enregistrés, switch rapide) ---
  // Structure stockée : { list: [{id, dataUrl}], activeId }
  function loadLib() {
    try {
      return JSON.parse(localStorage.getItem('lanceur_wallpapers')) || { list: [], activeId: null };
    } catch { return { list: [], activeId: null }; }
  }
  function saveLib(lib) {
    try {
      localStorage.setItem('lanceur_wallpapers', JSON.stringify(lib));
    } catch (err) {
      statusEl.textContent = "⚠ Quota de stockage dépassé — supprimez un ancien fond avant d'en ajouter un nouveau.";
      console.error(err);
    }
  }

  let lib = loadLib();

  function renderGallery() {
    galleryEl.innerHTML = '';
    lib.list.forEach(item => {
      const div = document.createElement('div');
      div.className = 'thumb' + (item.id === lib.activeId ? ' active' : '');
      div.style.backgroundImage = `url(${item.dataUrl})`;
      div.title = 'Cliquer pour appliquer ce fond';
      div.addEventListener('click', () => {
        lib.activeId = item.id;
        saveLib(lib);
        applyBg(item.dataUrl);
        renderGallery();
      });
      const del = document.createElement('div');
      del.className = 'del';
      del.textContent = '✕';
      del.title = 'Supprimer ce fond';
      del.addEventListener('click', (ev) => {
        ev.stopPropagation();
        lib.list = lib.list.filter(w => w.id !== item.id);
        if (lib.activeId === item.id) {
          lib.activeId = lib.list.length ? lib.list[0].id : null;
          applyBg(lib.activeId ? lib.list.find(w => w.id === lib.activeId).dataUrl : null);
        }
        saveLib(lib);
        renderGallery();
      });
      div.appendChild(del);
      galleryEl.appendChild(div);
    });
  }

  // Applique le fond actif au chargement
  if (lib.activeId) {
    const active = lib.list.find(w => w.id === lib.activeId);
    if (active) applyBg(active.dataUrl);
  }
  renderGallery();

  addBg.addEventListener('click', () => bgFile.click());

  // Compresse une image (redimensionnement + JPEG qualité réduite) avant stockage
  // pour éviter de saturer le quota localStorage (~5 Mo par domaine).
  function compressImage(file, maxDim = 1920, quality = 0.75) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = () => {
        img.onload = () => {
          let { width, height } = img;
          if (width > height && width > maxDim) {
            height = Math.round(height * (maxDim / width));
            width = maxDim;
          } else if (height > maxDim) {
            width = Math.round(width * (maxDim / height));
            height = maxDim;
          }
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          canvas.getContext('2d').drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  bgFile.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    statusEl.textContent = "⏳ Compression de l'image...";
    try {
      const dataUrl = await compressImage(file);
      const id = Date.now().toString(36);
      lib.list.push({ id, dataUrl });
      lib.activeId = id;
      saveLib(lib);
      applyBg(dataUrl);
      renderGallery();
      statusEl.textContent = "✅ Fond ajouté.";
    } catch (err) {
      if (err && err.name === 'QuotaExceededError') {
        statusEl.textContent = "⚠ Quota de stockage dépassé — supprimez un ancien fond avant d'en ajouter un nouveau.";
      } else {
        statusEl.textContent = "⚠ Impossible d'ajouter cette image.";
        console.error(err);
      }
    }
    bgFile.value = '';
  });

  // --- Panneau expressions : rendu + interactions ---
  const exprToggle = document.getElementById('exprToggle');
  const exprPanel = document.getElementById('exprPanel');
  const exprList = document.getElementById('exprList');
  const exprNew = document.getElementById('exprNew');
  const exprAddBtn = document.getElementById('exprAddBtn');
  const exprExport = document.getElementById('exprExport');
  const exprImportFile = document.getElementById('exprImportFile');
  const exprReset = document.getElementById('exprReset');
  const exprStatus = document.getElementById('exprStatus');

  exprToggle.addEventListener('click', () => {
    exprPanel.classList.toggle('open');
  });

  function flashExprStatus(msg) {
    exprStatus.textContent = msg;
    setTimeout(() => { if (exprStatus.textContent === msg) exprStatus.textContent = ''; }, 2500);
  }

  function persist() {
    if (!saveExpressions(expressions)) {
      flashExprStatus("⚠ Quota de stockage dépassé — impossible d'enregistrer.");
    }
  }

  function renderExprList() {
    exprList.innerHTML = '';
    expressions.forEach((text, idx) => {
      const row = document.createElement('div');
      row.className = 'expr-row';

      const ta = document.createElement('textarea');
      ta.value = text;
      ta.rows = 2;
      ta.addEventListener('change', () => {
        expressions[idx] = ta.value.trim();
        persist();
        flashExprStatus('✅ Modifié.');
      });

      const del = document.createElement('div');
      del.className = 'expr-del';
      del.textContent = '✕';
      del.title = 'Supprimer';
      del.addEventListener('click', () => {
        expressions.splice(idx, 1);
        persist();
        renderExprList();
        flashExprStatus('🗑 Supprimé.');
      });

      row.appendChild(ta);
      row.appendChild(del);
      exprList.appendChild(row);
    });
  }
  renderExprList();

  exprAddBtn.addEventListener('click', () => {
    const val = exprNew.value.trim();
    if (!val) return;
    expressions.push(val);
    persist();
    exprNew.value = '';
    renderExprList();
    flashExprStatus('✅ Ajouté.');
  });

  exprNew.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      exprAddBtn.click();
    }
  });

  exprExport.addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(expressions, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'expressions.json';
    a.click();
    URL.revokeObjectURL(url);
    flashExprStatus('⬇ Export effectué.');
  });

  exprImportFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!Array.isArray(data)) throw new Error('Format invalide (attendu : tableau JSON de chaînes)');
        const clean = data.map(v => String(v).trim()).filter(Boolean);
        if (!clean.length) throw new Error('Aucune expression trouvée dans le fichier');
        // Fusionne avec l'existant en évitant les doublons
        const merged = expressions.slice();
        clean.forEach(v => { if (!merged.includes(v)) merged.push(v); });
        expressions = merged;
        persist();
        renderExprList();
        flashExprStatus(`✅ ${clean.length} expression(s) importée(s).`);
      } catch (err) {
        flashExprStatus('⚠ Fichier JSON invalide.');
        console.error(err);
      }
    };
    reader.readAsText(file);
    exprImportFile.value = '';
  });

  exprReset.addEventListener('click', () => {
    if (!confirm('Réinitialiser la liste avec les expressions par défaut ? Vos ajouts/modifications seront perdus.')) return;
    expressions = DEFAULT_EXPRESSIONS.slice();
    persist();
    renderExprList();
    flashExprStatus('↺ Réinitialisé.');
  });

  // --- Ouverture / focus de l'onglet ---
  // window.open avec un nom fixe : si un onglet portant ce nom est déjà ouvert,
  // Firefox le réutilise (le fait passer au premier plan) au lieu d'en créer un nouveau.
  document.getElementById('launch').addEventListener('click', () => {
    const win = window.open(URL_CIBLE, WINDOW_NAME);
    if (win) {
      const dejaOuvert = win.__lanceurDejaOuvert === true;
      win.__lanceurDejaOuvert = true;
      win.focus();
      statusEl.textContent = dejaOuvert
        ? "✅ Onglet déjà ouvert — mis au premier plan."
        : "🆕 Nouvel onglet ouvert.";
    } else {
      statusEl.textContent = "⚠ Bloqué par le bloqueur de pop-ups — autorisez les pop-ups pour ce fichier.";
    }
  });
</script>
</body>
</html>
