<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Lanceur — Bookmarks Pro</title>
<style>
  :root {
    --overlay: rgba(0,0,0,0.35);
  }
  html, body {
    margin: 0; height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-color: #1a1a2e;
    transition: background-color .3s;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    background: linear-gradient(var(--overlay), var(--overlay));
  }
  #launch {
    padding: 22px 48px;
    font-size: 1.4rem;
    font-weight: 600;
    color: #fff;
    background: rgba(255,255,255,0.12);
    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 14px;
    backdrop-filter: blur(6px);
    cursor: pointer;
    transition: background .2s, transform .1s;
  }
  #launch:hover { background: rgba(255,255,255,0.22); }
  #launch:active { transform: scale(0.97); }
  #status {
    color: #eee;
    font-size: 0.9rem;
    min-height: 1.2em;
    text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  }
  .settings {
    position: fixed;
    bottom: 16px;
    right: 16px;
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(0,0,0,0.35);
    padding: 10px 14px;
    border-radius: 10px;
    backdrop-filter: blur(4px);
  }
  .settings label {
    color: #fff;
    font-size: 0.8rem;
  }
  .settings input[type="color"] {
    width: 32px; height: 32px; border: none; background: none; cursor: pointer;
  }
  .settings button {
    font-size: 0.75rem;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.1);
    color: #fff;
    cursor: pointer;
  }
  .settings button:hover { background: rgba(255,255,255,0.2); }

  .gallery {
    position: fixed;
    bottom: 64px;
    right: 16px;
    display: flex;
    gap: 8px;
    max-width: 70vw;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .thumb {
    position: relative;
    width: 52px;
    height: 52px;
    border-radius: 8px;
    background-size: cover;
    background-position: center;
    border: 2px solid rgba(255,255,255,0.4);
    cursor: pointer;
    overflow: hidden;
    transition: border-color .15s, transform .1s;
  }
  .thumb:hover { transform: scale(1.06); }
  .thumb.active { border-color: #fff; box-shadow: 0 0 0 2px rgba(255,255,255,0.6); }
  .thumb .del {
    position: absolute;
    top: 1px; right: 1px;
    width: 16px; height: 16px;
    line-height: 16px;
    text-align: center;
    font-size: 11px;
    background: rgba(0,0,0,0.6);
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
  }
  .thumb.add {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.4rem;
    background: rgba(255,255,255,0.1);
  }
</style>
</head>
<body>
  <div class="wrap">
    <button id="launch">📑 Ouvrir Bookmarks Pro</button>
    <div id="status"></div>
  </div>

  <div class="gallery" id="gallery"></div>

  <div class="settings">
    <label>Overlay
      <input type="range" id="overlayRange" min="0" max="90" value="35">
    </label>
    <input type="file" id="bgFile" accept="image/*" style="display:none">
    <button id="addBg">+ Ajouter un fond</button>
  </div>

<script>
  const URL_CIBLE = "https://bencm0i.github.io/Sant-/bookmarks_pro.html";
  const WINDOW_NAME = "bookmarksProTab"; // nom fixe : window.open réutilise l'onglet existant

  const statusEl = document.getElementById('status');
  const overlayRange = document.getElementById('overlayRange');
  const bgFile = document.getElementById('bgFile');
  const addBg = document.getElementById('addBg');
  const galleryEl = document.getElementById('gallery');

  // --- Fond d'écran ---
  function applyBg(dataUrl) {
    document.body.style.backgroundImage = dataUrl ? `url(${dataUrl})` : 'none';
  }

  function applyOverlay(val) {
    document.documentElement.style.setProperty('--overlay', `rgba(0,0,0,${val/100})`);
  }

  const savedOverlay = localStorage.getItem('lanceur_overlay');
  if (savedOverlay) { overlayRange.value = savedOverlay; applyOverlay(savedOverlay); }
  else applyOverlay(35);

  overlayRange.addEventListener('input', (e) => {
    localStorage.setItem('lanceur_overlay', e.target.value);
    applyOverlay(e.target.value);
  });

  // --- Bibliothèque de wallpapers (plusieurs fonds enregistrés, switch rapide) ---
  // Structure stockée : { list: [{id, dataUrl}], activeId }
  function loadLib() {
    try {
      return JSON.parse(localStorage.getItem('lanceur_wallpapers')) || { list: [], activeId: null };
    } catch { return { list: [], activeId: null }; }
  }
  function saveLib(lib) {
    localStorage.setItem('lanceur_wallpapers', JSON.stringify(lib));
  }

  let lib = loadLib();

  function renderGallery() {
    galleryEl.innerHTML = '';
    lib.list.forEach(item => {
      const div = document.createElement('div');
      div.className = 'thumb' + (item.id === lib.activeId ? ' active' : '');
      div.style.backgroundImage = `url(${item.dataUrl})`;
      div.title = 'Cliquer pour appliquer ce fond';
      div.addEventListener('click', () => {
        lib.activeId = item.id;
        saveLib(lib);
        applyBg(item.dataUrl);
        renderGallery();
      });
      const del = document.createElement('div');
      del.className = 'del';
      del.textContent = '✕';
      del.title = 'Supprimer ce fond';
      del.addEventListener('click', (ev) => {
        ev.stopPropagation();
        lib.list = lib.list.filter(w => w.id !== item.id);
        if (lib.activeId === item.id) {
          lib.activeId = lib.list.length ? lib.list[0].id : null;
          applyBg(lib.activeId ? lib.list.find(w => w.id === lib.activeId).dataUrl : null);
        }
        saveLib(lib);
        renderGallery();
      });
      div.appendChild(del);
      galleryEl.appendChild(div);
    });
  }

  // Applique le fond actif au chargement
  if (lib.activeId) {
    const active = lib.list.find(w => w.id === lib.activeId);
    if (active) applyBg(active.dataUrl);
  }
  renderGallery();

  addBg.addEventListener('click', () => bgFile.click());

  bgFile.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      const id = Date.now().toString(36);
      lib.list.push({ id, dataUrl: reader.result });
      lib.activeId = id;
      saveLib(lib);
      applyBg(reader.result);
      renderGallery();
    };
    reader.readAsDataURL(file);
    bgFile.value = '';
  });

  // --- Ouverture / focus de l'onglet ---
  // window.open avec un nom fixe : si un onglet portant ce nom est déjà ouvert,
  // Firefox le réutilise (le fait passer au premier plan) au lieu d'en créer un nouveau.
  document.getElementById('launch').addEventListener('click', () => {
    const win = window.open(URL_CIBLE, WINDOW_NAME);
    if (win) {
      const dejaOuvert = win.__lanceurDejaOuvert === true;
      win.__lanceurDejaOuvert = true;
      win.focus();
      statusEl.textContent = dejaOuvert
        ? "✅ Onglet déjà ouvert — mis au premier plan."
        : "🆕 Nouvel onglet ouvert.";
    } else {
      statusEl.textContent = "⚠ Bloqué par le bloqueur de pop-ups — autorisez les pop-ups pour ce fichier.";
    }
  });
</script>
</body>
</html>
