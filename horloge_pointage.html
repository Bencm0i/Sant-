<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pointeuse — Aventech</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F1EFE8;
  --bg-card: #FAFAF8;
  --bg-card2: #FFFFFF;
  --border: #C8C6BC;
  --border-light: #E0DED6;
  --text: #2C2C2A;
  --text-mid: #5F5E5A;
  --text-muted: #888780;
  --blue: #378ADD;
  --blue-bg: #E6F1FB;
  --blue-border: #85B7EB;
  --blue-dark: #185FA5;
  --red: #E24B4A;
  --red-bg: #FCEBEB;
  --red-border: #F09595;
  --red-dark: #A32D2D;
  --green: #3B6D11;
  --green-bg: #EAF3DE;
  --led-on: #639922;
  --radius: 8px;
  --radius-lg: 12px;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1C1C1A;
    --bg-card: #252523;
    --bg-card2: #2E2E2B;
    --border: #444441;
    --border-light: #383836;
    --text: #F1EFE8;
    --text-mid: #B4B2A9;
    --text-muted: #888780;
    --blue-bg: #0C2F52;
    --blue-border: #185FA5;
    --red-bg: #3D1111;
    --red-border: #791F1F;
    --green-bg: #17340A;
  }
}

body {
  font-family: 'Courier New', Courier, monospace;
  background: var(--bg);
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 2rem 1rem;
  color: var(--text);
}

.machine {
  width: 100%;
  max-width: 560px;
  background: var(--bg-card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.25rem;
  position: relative;
}

.machine::before {
  content: '';
  position: absolute;
  top: 0; left: 20px; right: 20px;
  height: 3px;
  background: repeating-linear-gradient(90deg, var(--border) 0, var(--border) 6px, transparent 6px, transparent 10px);
  border-radius: 2px;
  opacity: 0.4;
}

.machine-header {
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid var(--border-light);
  padding-bottom: 10px;
  margin-bottom: 1rem;
  padding-top: 6px;
}
.machine-brand {
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: system-ui, sans-serif;
  flex: 1;
}
.machine-model {
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-family: system-ui, sans-serif;
}
.led {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--led-on);
  flex-shrink: 0;
}
.led.alert { background: var(--red); animation: led-blink 0.5s step-start infinite; }
@keyframes led-blink { 0%,100% { opacity:1 } 50% { opacity:0.15 } }

/* Alert ribbon */
.alert-ribbon {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: var(--red-bg);
  border: 1px solid var(--red-border);
  border-radius: var(--radius);
  margin-bottom: 0.75rem;
  font-size: 13px;
  color: var(--red-dark);
  font-family: system-ui, sans-serif;
  animation: ribbon-pulse 1s ease-in-out infinite;
}
.alert-ribbon.show { display: flex; }
@keyframes ribbon-pulse {
  0%,100% { border-color: var(--red-border); }
  50% { border-color: var(--red); }
}

/* Card slot */
.card-slot {
  background: var(--bg-card2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1rem 1.25rem 1rem;
  margin-bottom: 1rem;
}
.card-perfs {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}
.perf {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
}

/* Clock */
.time-display { text-align: center; padding: 0.5rem 0 0.75rem; }
.time-big {
  font-size: clamp(3.5rem, 14vw, 5.5rem);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--text);
  line-height: 1;
}
.time-big.alert { animation: clock-blink 0.6s step-start infinite; }
@keyframes clock-blink {
  0%,100% { color: var(--red); }
  50% { color: var(--text); }
}
.date-stamp {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  margin-top: 6px;
}

/* Timeline */
.tl-section { margin: 0.75rem 0 0.5rem; }
.tl-label {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: system-ui, sans-serif;
  margin-bottom: 8px;
}
.tl-track {
  position: relative;
  height: 6px;
  background: var(--border-light);
  border-radius: 3px;
  margin-bottom: 8px;
}
.tl-fill {
  height: 100%;
  background: var(--blue);
  border-radius: 3px;
  transition: width 1s linear;
}
.tl-markers { position: relative; height: 24px; }
.tl-marker {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  transform: translateX(-50%);
}
.tl-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 1.5px solid var(--blue);
  background: var(--bg-card2);
  margin-bottom: 2px;
  transition: background 0.3s;
}
.tl-dot.passed { background: var(--blue); }
.tl-tick-label {
  font-size: 9px;
  color: var(--text-muted);
  white-space: nowrap;
}
.tl-next {
  font-size: 12px;
  color: var(--text-muted);
  font-family: system-ui, sans-serif;
  margin-top: 8px;
  min-height: 16px;
}
.tl-next strong { color: var(--text); }

/* Ticket separator */
.ticket-line {
  border-top: 1px dashed var(--border);
  margin-top: 0.75rem;
  padding-top: 0.75rem;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  font-family: system-ui, sans-serif;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.work-time { color: var(--text); font-weight: 600; font-size: 13px; }

/* Events grid */
.events-title {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: system-ui, sans-serif;
  margin-bottom: 8px;
}
.events-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 6px;
  margin-bottom: 1rem;
}
.ev-card {
  background: var(--bg-card2);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 8px 10px;
  position: relative;
  transition: border-color 0.2s, background 0.2s;
}
.ev-card.firing {
  border-color: var(--red);
  background: var(--red-bg);
}
.ev-label {
  font-size: 10px;
  color: var(--text-muted);
  font-family: system-ui, sans-serif;
  margin-bottom: 3px;
}
.ev-input {
  width: 100%;
  font-size: 16px;
  font-family: 'Courier New', Courier, monospace;
  font-weight: 500;
  border: none;
  background: transparent;
  color: var(--text);
  padding: 0;
  outline: none;
  cursor: pointer;
}
.ev-input:focus { border-bottom: 1.5px solid var(--blue); }
.ev-icon {
  font-size: 13px;
  color: var(--text-muted);
  position: absolute;
  top: 8px; right: 8px;
}
.ev-card.firing .ev-icon { color: var(--red-dark); }

/* Buttons */
.action-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.btn {
  font-family: system-ui, sans-serif;
  font-size: 12px;
  padding: 7px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card2);
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: background 0.15s;
}
.btn:hover { background: var(--bg-card); }
.btn.save-btn { border-color: var(--blue-border); color: var(--blue-dark); background: var(--blue-bg); }
.btn.save-btn:hover { background: #B5D4F4; }
.btn.test-btn { border-color: var(--red-border); color: var(--red-dark); background: var(--red-bg); }
.btn.test-btn:hover { background: #F7C1C1; }
.saved-flash {
  font-size: 12px;
  font-family: system-ui, sans-serif;
  color: var(--green);
  display: none;
  align-items: center;
  gap: 4px;
}
.saved-flash.show { display: flex; }

/* Responsive */
@media (max-width: 400px) {
  body { padding: 1rem 0.5rem; }
  .machine { padding: 1rem; }
  .events-grid { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>

<div class="machine">

  <div class="machine-header">
    <span class="machine-brand">Pointeuse · Aventech</span>
    <span class="machine-model">PT-2025</span>
    <div class="led" id="led"></div>
  </div>

  <div id="alert-ribbon" class="alert-ribbon">
    <i class="ti ti-bell-ringing"></i>
    <span id="alert-text">Pointage</span>
  </div>

  <div class="card-slot">
    <div class="card-perfs" id="perfs"></div>

    <div class="time-display">
      <div class="time-big" id="clock">00:00:00</div>
      <div class="date-stamp" id="dateline"></div>
    </div>

    <div class="tl-section">
      <div class="tl-label">Progression journée</div>
      <div class="tl-track">
        <div class="tl-fill" id="tl-fill" style="width:0%"></div>
      </div>
      <div class="tl-markers" id="tl-markers"></div>
    </div>

    <div class="tl-next" id="tl-next"></div>

    <div class="ticket-line">
      <span>Temps travaillé</span>
      <span class="work-time" id="work-time">—</span>
    </div>
  </div>

  <div class="events-title">Horaires</div>
  <div class="events-grid" id="events-grid"></div>

  <div class="action-row">
    <button class="btn save-btn" onclick="saveSettings()">
      <i class="ti ti-device-floppy"></i> Sauvegarder
    </button>
    <button class="btn test-btn" onclick="testAlert()">
      <i class="ti ti-bell-ringing"></i> Tester
    </button>
    <div class="saved-flash" id="saved-flash">
      <i class="ti ti-check"></i> Sauvegardé
    </div>
  </div>

</div>

<script>
const EVENTS_DEF = [
  { key:'arrivee',  label:'Arrivée',       icon:'ti-sunrise',          default:'08:00' },
  { key:'pause1',   label:'Pause matin',   icon:'ti-coffee',           default:'10:00' },
  { key:'retour1',  label:'Retour pause',  icon:'ti-arrow-back-up',    default:'10:15' },
  { key:'dejeuner', label:'Déjeuner',      icon:'ti-tools-kitchen-2',  default:'12:00' },
  { key:'pause2',   label:'Retour déj.',   icon:'ti-arrow-back-up',    default:'13:30' },
  { key:'depart',   label:'Départ',        icon:'ti-moon',             default:'17:30' },
];

let settings = {};
let alertTimeout = null;
let lastTriggered = {};

function loadSettings() {
  try { const s = localStorage.getItem('pointage_v2'); if (s) settings = JSON.parse(s); } catch(e) {}
  EVENTS_DEF.forEach(e => { if (!settings[e.key]) settings[e.key] = e.default; });
}

function saveSettings() {
  EVENTS_DEF.forEach(e => {
    const el = document.getElementById('input_' + e.key);
    if (el) settings[e.key] = el.value;
  });
  try { localStorage.setItem('pointage_v2', JSON.stringify(settings)); } catch(e) {}
  buildTimeline();
  const f = document.getElementById('saved-flash');
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 2000);
}

function buildGrid() {
  const grid = document.getElementById('events-grid');
  grid.innerHTML = '';
  EVENTS_DEF.forEach(e => {
    const card = document.createElement('div');
    card.className = 'ev-card';
    card.id = 'card_' + e.key;
    card.innerHTML = `<div class="ev-label">${e.label}</div>
      <input class="ev-input" type="time" id="input_${e.key}" value="${settings[e.key]}" />
      <i class="ti ${e.icon} ev-icon"></i>`;
    grid.appendChild(card);
  });
  buildPerfs();
}

function buildPerfs() {
  const perfs = document.getElementById('perfs');
  perfs.innerHTML = '';
  for (let i = 0; i < 14; i++) {
    const d = document.createElement('div');
    d.className = 'perf';
    perfs.appendChild(d);
  }
}

function timeToMins(t) {
  if (!t) return 0;
  const [h, m] = t.split(':').map(Number);
  return h * 60 + m;
}
function minsToHHMM(m) {
  return String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');
}
function pct(val, min, max) {
  return Math.min(100, Math.max(0, (val - min) / (max - min) * 100));
}
function getEvMins(key) {
  const el = document.getElementById('input_' + key);
  return timeToMins(el ? el.value : settings[key]);
}

function buildTimeline() {
  const evs = EVENTS_DEF.map(e => ({ ...e, mins: getEvMins(e.key) })).sort((a, b) => a.mins - b.mins);
  const first = evs[0].mins, last = evs[evs.length - 1].mins;
  if (last <= first) return;
  const container = document.getElementById('tl-markers');
  container.innerHTML = '';
  evs.forEach(ev => {
    const p = pct(ev.mins, first, last);
    const wrap = document.createElement('div');
    wrap.className = 'tl-marker';
    wrap.id = 'marker_' + ev.key;
    wrap.style.left = p.toFixed(1) + '%';
    wrap.innerHTML = `<div class="tl-dot" id="dot_${ev.key}"></div>
      <div class="tl-tick-label">${minsToHHMM(ev.mins)}</div>`;
    container.appendChild(wrap);
  });
}

function calcWorkTime(nowMins) {
  const arr = getEvMins('arrivee');
  const dej = getEvMins('dejeuner');
  const ret = getEvMins('pause2');
  const dep = getEvMins('depart');
  if (nowMins < arr) return null;
  let morning = Math.min(nowMins, dej) - arr;
  if (morning < 0) morning = 0;
  let afternoon = 0;
  if (nowMins > ret) {
    afternoon = Math.min(nowMins, dep) - ret;
    if (afternoon < 0) afternoon = 0;
  }
  return morning + afternoon;
}

function tick() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2, '0');
  const m = String(now.getMinutes()).padStart(2, '0');
  const s = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;

  const days = ['Dim', 'Lun', 'Mar', 'Mer', 'Jeu', 'Ven', 'Sam'];
  const months = ['JAN','FÉV','MAR','AVR','MAI','JUN','JUL','AOÛ','SEP','OCT','NOV','DÉC'];
  document.getElementById('dateline').textContent =
    days[now.getDay()] + ' ' + String(now.getDate()).padStart(2, '0') + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();

  const nowMins = now.getHours() * 60 + now.getMinutes();
  const nowSecs = nowMins * 60 + now.getSeconds();

  const evs = EVENTS_DEF.map(e => ({ ...e, mins: getEvMins(e.key) })).sort((a, b) => a.mins - b.mins);
  const first = evs[0].mins, last = evs[evs.length - 1].mins;

  evs.forEach(ev => {
    const evSecs = ev.mins * 60;
    const diff = nowSecs - evSecs;
    if (diff >= 0 && diff < 60) {
      const key = ev.key + '_' + Math.floor(nowSecs / 60);
      if (!lastTriggered[key]) {
        lastTriggered[key] = true;
        triggerAlert(ev.label);
      }
    }
    const card = document.getElementById('card_' + ev.key);
    if (card) {
      card.className = 'ev-card' + (nowSecs - ev.mins * 60 >= 0 && nowSecs - ev.mins * 60 < 60 ? ' firing' : '');
    }
    const dot = document.getElementById('dot_' + ev.key);
    if (dot) dot.className = 'tl-dot' + (ev.mins <= nowMins ? ' passed' : '');
  });

  if (last > first) {
    document.getElementById('tl-fill').style.width = pct(nowMins, first, last).toFixed(1) + '%';
  }

  const next = evs.find(ev => ev.mins > nowMins);
  const nextEl = document.getElementById('tl-next');
  if (next) {
    const diff = next.mins - nowMins;
    nextEl.innerHTML = `Prochain : <strong>${next.label} ${minsToHHMM(next.mins)}</strong> — dans ${diff} min`;
  } else {
    nextEl.innerHTML = '<strong>Journée terminée</strong>';
  }

  const wt = calcWorkTime(nowMins);
  const wtEl = document.getElementById('work-time');
  if (wt !== null && wt > 0) {
    wtEl.textContent = Math.floor(wt / 60) + 'h' + String(wt % 60).padStart(2, '0');
  } else {
    wtEl.textContent = '—';
  }

  const led = document.getElementById('led');
  led.className = document.getElementById('alert-ribbon').classList.contains('show') ? 'led alert' : 'led';
}

function triggerAlert(label) {
  const ribbon = document.getElementById('alert-ribbon');
  const clockEl = document.getElementById('clock');
  document.getElementById('alert-text').textContent = 'Pointage : ' + label;
  ribbon.classList.add('show');
  clockEl.classList.add('alert');
  if (alertTimeout) clearTimeout(alertTimeout);
  alertTimeout = setTimeout(() => {
    ribbon.classList.remove('show');
    clockEl.classList.remove('alert');
  }, 30000);
  try {
    const ctx = new AudioContext();
    [0, 0.35, 0.7].forEach(t => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'square';
      o.frequency.value = 660;
      g.gain.setValueAtTime(0.15, ctx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + t + 0.2);
      o.start(ctx.currentTime + t);
      o.stop(ctx.currentTime + t + 0.25);
    });
  } catch(e) {}
}

function testAlert() { triggerAlert('Test alarme'); }

loadSettings();
buildGrid();
buildTimeline();
tick();
setInterval(tick, 1000);
</script>
</body>
</html>
