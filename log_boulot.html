<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOG BOULOT</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Lora:ital,wght@0,400;0,600;1,400&family=Playfair+Display:wght@700&display=swap');

  :root {
    --bg: #f5ede0;
    --bg2: #ede0cc;
    --bg3: #e8d5b7;
    --panel: #fdf6ec;
    --border: #c9a97a;
    --border2: #b8955f;
    --accent: #e07820;
    --accent2: #c05f10;
    --accent3: #f59640;
    --text: #3a2a18;
    --text2: #6b4e2a;
    --text3: #9a7a55;
    --tab-active: #e07820;
    --tab-bg: #dcc9a8;
    --tab-text-active: #fff;
    --ts-bg: #fff8f0;
    --ts-border: #e0a060;
    --ts-num: #e07820;
    --header-bg: #f0e2cc;
    --shadow: rgba(180,120,50,0.13);
    --btn-ia: #e07820;
    --btn-ia-hover: #c05f10;
    --tag-bg: #fde8c8;
    --tag-text: #c05f10;
    --priority-high: #d94f30;
    --priority-med: #e07820;
    --priority-low: #6a9e5a;
    --scrollbar: #d4b48a;
    --font-mono: 'Share Tech Mono', monospace;
    --font-body: 'Lora', serif;
    --font-title: 'Playfair Display', serif;
  }

  body.mil {
    --bg: #1a1f14;
    --bg2: #151a10;
    --bg3: #11150d;
    --panel: #1e2418;
    --border: #3a4a2a;
    --border2: #4a5e30;
    --accent: #6aaa20;
    --accent2: #4a8010;
    --accent3: #8acc40;
    --text: #c8d8a0;
    --text2: #8aaa60;
    --text3: #5a7840;
    --tab-active: #6aaa20;
    --tab-bg: #252d1c;
    --tab-text-active: #0d1008;
    --ts-bg: #1a2010;
    --ts-border: #3a5020;
    --ts-num: #6aaa20;
    --header-bg: #161d10;
    --shadow: rgba(0,0,0,0.5);
    --btn-ia: #4a8010;
    --btn-ia-hover: #6aaa20;
    --tag-bg: #1f2c12;
    --tag-text: #8acc40;
    --priority-high: #e04030;
    --priority-med: #cc8010;
    --priority-low: #6aaa20;
    --scrollbar: #3a4a2a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }

  /* ===== HEADER ===== */
  #header {
    background: var(--header-bg);
    border-bottom: 2px solid var(--border2);
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }

  #logo {
    font-family: var(--font-title);
    font-size: 1.35rem;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  body.mil #logo { font-family: var(--font-mono); letter-spacing: 3px; }

  #clock-box {
    font-family: var(--font-mono);
    background: var(--ts-bg);
    border: 1px solid var(--ts-border);
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 0.92rem;
    color: var(--ts-num);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .ia-links {
    display: flex;
    gap: 7px;
    flex-wrap: wrap;
    margin-left: auto;
  }

  .ia-btn {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    padding: 4px 11px;
    border: 1.5px solid var(--border2);
    border-radius: 3px;
    background: var(--tab-bg);
    color: var(--text2);
    cursor: pointer;
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.18s, color 0.18s, border-color 0.18s;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .ia-btn:hover { background: var(--btn-ia); color: #fff; border-color: var(--btn-ia); }
  .ia-btn svg { width:13px; height:13px; }

  #theme-toggle {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 4px 13px;
    border: 1.5px solid var(--accent);
    border-radius: 3px;
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  #theme-toggle:hover { background: var(--accent); color: #fff; }

  /* ===== TABS BAR ===== */
  #tabs-bar {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    padding: 10px 14px 0;
    background: var(--bg2);
    border-bottom: 2px solid var(--border);
    overflow-x: auto;
    flex-wrap: nowrap;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px 7px;
    background: var(--tab-bg);
    border: 1.5px solid var(--border);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 0.82rem;
    color: var(--text2);
    min-width: 90px;
    max-width: 180px;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
    position: relative;
  }
  .tab:hover { background: var(--bg3); }
  .tab.active {
    background: var(--accent);
    color: var(--tab-text-active);
    border-color: var(--accent2);
    font-weight: 700;
  }

  .tab-name {
    outline: none;
    border: none;
    background: transparent;
    color: inherit;
    font-family: inherit;
    font-size: inherit;
    width: 80px;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tab.active .tab-name { cursor: text; color: var(--tab-text-active); }

  .tab-close {
    font-size: 0.85rem;
    opacity: 0.6;
    cursor: pointer;
    padding: 0 2px;
    flex-shrink: 0;
  }
  .tab-close:hover { opacity: 1; }

  #add-tab {
    padding: 5px 13px 7px;
    background: transparent;
    border: 1.5px dashed var(--border2);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    cursor: pointer;
    font-size: 1.1rem;
    color: var(--text3);
    transition: color 0.15s;
    flex-shrink: 0;
  }
  #add-tab:hover { color: var(--accent); border-color: var(--accent); }

  /* ===== LOG COUNT BADGE ===== */
  .tab-badge {
    font-size: 0.62rem;
    background: var(--accent3);
    color: #fff;
    border-radius: 8px;
    padding: 1px 5px;
    font-family: var(--font-mono);
    flex-shrink: 0;
  }
  .tab.active .tab-badge { background: rgba(255,255,255,0.35); color: var(--tab-text-active); }

  /* ===== MAIN AREA ===== */
  #main {
    display: flex;
    gap: 0;
    height: calc(100vh - 120px);
  }

  /* ===== LOG PANEL ===== */
  #log-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 16px 10px;
    overflow: hidden;
  }

  /* ===== TOOLBAR ===== */
  #toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }

  #entry-input {
    flex: 1;
    min-width: 200px;
    font-family: var(--font-body);
    font-size: 0.95rem;
    padding: 7px 12px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  #entry-input:focus { border-color: var(--accent); }
  #entry-input::placeholder { color: var(--text3); font-style: italic; }

  .priority-sel {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    padding: 7px 8px;
    background: var(--tab-bg);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    cursor: pointer;
    outline: none;
  }

  .tag-input {
    font-family: var(--font-mono);
    font-size: 0.78rem;
    padding: 7px 10px;
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-radius: 4px;
    color: var(--text2);
    outline: none;
    width: 110px;
  }
  .tag-input::placeholder { color: var(--text3); }

  #btn-add {
    font-family: var(--font-mono);
    font-size: 0.82rem;
    padding: 7px 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #btn-add:hover { background: var(--accent2); }

  /* ===== FILTER BAR ===== */
  #filter-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  #search-input {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    padding: 4px 10px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text2);
    outline: none;
    width: 160px;
  }
  #search-input::placeholder { color: var(--text3); }

  .filter-btn {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: var(--tab-bg);
    color: var(--text3);
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .filter-btn.active, .filter-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent2); }

  #entry-count {
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text3);
    margin-left: auto;
  }

  /* ===== LOG ENTRIES ===== */
  #log-list {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-right: 4px;
  }

  #log-list::-webkit-scrollbar { width: 5px; }
  #log-list::-webkit-scrollbar-track { background: transparent; }
  #log-list::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 3px; }

  .log-entry {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent);
    border-radius: 3px;
    padding: 8px 12px;
    display: flex;
    align-items: flex-start;
    gap: 10px;
    animation: slideIn 0.18s ease;
    transition: opacity 0.2s;
  }
  .log-entry.hidden { display: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-entry.p-high { border-left-color: var(--priority-high); }
  .log-entry.p-med { border-left-color: var(--priority-med); }
  .log-entry.p-low { border-left-color: var(--priority-low); }
  .log-entry.done { opacity: 0.5; }
  .log-entry.done .entry-text { text-decoration: line-through; }

  .entry-check {
    margin-top: 3px;
    accent-color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
    width: 15px;
    height: 15px;
  }

  .entry-body { flex: 1; min-width: 0; }

  .entry-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
    flex-wrap: wrap;
  }

  .entry-ts {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--ts-num);
    white-space: nowrap;
  }

  .entry-tag {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    background: var(--tag-bg);
    color: var(--tag-text);
    border-radius: 2px;
    padding: 1px 6px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .priority-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .p-high .priority-dot { background: var(--priority-high); }
  .p-med .priority-dot { background: var(--priority-med); }
  .p-low .priority-dot { background: var(--priority-low); }

  .entry-text {
    font-size: 0.9rem;
    color: var(--text);
    line-height: 1.45;
    word-break: break-word;
    outline: none;
  }
  .entry-text:focus {
    background: var(--bg2);
    border-radius: 2px;
    padding: 1px 4px;
  }

  .entry-actions {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .entry-action {
    font-size: 0.78rem;
    cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.15s;
    background: none;
    border: none;
    color: var(--text);
    padding: 0;
  }
  .entry-action:hover { opacity: 1; }

  /* ===== SIDEBAR ===== */
  #sidebar {
    width: 200px;
    background: var(--bg2);
    border-left: 2px solid var(--border);
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-section h4 {
    font-family: var(--font-mono);
    font-size: 0.68rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: var(--text2);
    margin-bottom: 5px;
  }
  .stat-val { color: var(--accent); font-weight: 700; }

  .export-btn {
    font-family: var(--font-mono);
    font-size: 0.72rem;
    padding: 5px 10px;
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: 3px;
    background: var(--tab-bg);
    color: var(--text2);
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 5px;
    transition: all 0.15s;
  }
  .export-btn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .note-area {
    font-family: var(--font-body);
    font-size: 0.8rem;
    padding: 7px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text);
    resize: none;
    width: 100%;
    min-height: 80px;
    outline: none;
  }
  .note-area::placeholder { color: var(--text3); font-style: italic; }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text3);
    font-style: italic;
    font-size: 0.88rem;
    border: 1.5px dashed var(--border);
    border-radius: 6px;
    margin-top: 10px;
  }

  /* ===== TOAST ===== */
  #toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--accent);
    color: #fff;
    font-family: var(--font-mono);
    font-size: 0.78rem;
    padding: 8px 16px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
    z-index: 999;
    letter-spacing: 1px;
  }
  #toast.show { opacity: 1; }

  /* ===== MIL EXTRAS ===== */
  body.mil #header { background: var(--header-bg); border-bottom: 2px solid var(--border2); }
  body.mil .log-entry { border-radius: 0; }
  body.mil .tab { border-radius: 0; }
  body.mil #entry-input { border-radius: 0; font-family: var(--font-mono); }
  body.mil #btn-add { border-radius: 0; }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="logo">📋 LOG BOULOT</div>
  <div id="clock-box">⏱ <span id="clock">--:--:--</span> | <span id="datebox">--/--/----</span></div>

  <div class="ia-links">
    <a href="https://claude.ai" target="_blank" class="ia-btn" title="Claude">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
      CLAUDE
    </a>
    <a href="https://grok.x.ai" target="_blank" class="ia-btn" title="Grok">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V7.84a8.25 8.25 0 004.82 1.55V5.93a4.85 4.85 0 01-1.05-.24z"/></svg>
      GROK
    </a>
    <a href="https://gemini.google.com" target="_blank" class="ia-btn" title="Gemini">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      GEMINI
    </a>
    <a href="https://chatgpt.com" target="_blank" class="ia-btn" title="ChatGPT">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1944a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0966 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2599 24a6.0557 6.0557 0 0 0 5.7718-4.2058 5.9894 5.9894 0 0 0 3.9977-2.9001 6.0557 6.0557 0 0 0-.7475-7.0729zm-9.022 12.6081a4.4755 4.4755 0 0 1-2.8764-1.0408l.1419-.0804 4.7783-2.7582a.7948.7948 0 0 0 .3927-.6813v-6.7369l2.02 1.1686a.071.071 0 0 1 .038.052v5.5826a4.504 4.504 0 0 1-4.4945 4.4944z"/></svg>
      GPT
    </a>
  </div>

  <button id="theme-toggle" onclick="toggleTheme()">⚡ MIL</button>
</div>

<!-- TABS BAR -->
<div id="tabs-bar">
  <!-- tabs generated by JS -->
  <button id="add-tab" onclick="addTab()" title="Nouvel onglet">＋</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="log-panel">
    <!-- TOOLBAR -->
    <div id="toolbar">
      <input id="entry-input" type="text" placeholder="Nouvelle entrée de log… (Entrée pour valider)" onkeydown="if(event.key==='Enter')addEntry()">
      <select class="priority-sel" id="priority-sel">
        <option value="med">⚡ Normal</option>
        <option value="high">🔴 Urgent</option>
        <option value="low">🟢 Info</option>
      </select>
      <input class="tag-input" id="tag-input" type="text" placeholder="#tag">
      <button id="btn-add" onclick="addEntry()">＋ LOG</button>
    </div>

    <!-- FILTER BAR -->
    <div id="filter-bar">
      <input id="search-input" type="text" placeholder="🔍 Rechercher…" oninput="filterEntries()">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">TOUT</button>
      <button class="filter-btn" data-filter="high" onclick="setFilter('high',this)">🔴 URGENT</button>
      <button class="filter-btn" data-filter="med" onclick="setFilter('med',this)">⚡ NORMAL</button>
      <button class="filter-btn" data-filter="low" onclick="setFilter('low',this)">🟢 INFO</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">✅ FAIT</button>
      <span id="entry-count">0 entrée(s)</span>
    </div>

    <!-- LOG LIST -->
    <div id="log-list"></div>
  </div>

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-section">
      <h4>📊 Stats</h4>
      <div class="stat-row"><span>Total</span><span class="stat-val" id="stat-total">0</span></div>
      <div class="stat-row"><span>Urgents</span><span class="stat-val" id="stat-high">0</span></div>
      <div class="stat-row"><span>Faits</span><span class="stat-val" id="stat-done">0</span></div>
      <div class="stat-row"><span>Aujourd'hui</span><span class="stat-val" id="stat-today">0</span></div>
    </div>

    <div class="sidebar-section">
      <h4>📁 Export / Import</h4>
      <button class="export-btn" onclick="exportJSON()">⬇ JSON</button>
      <button class="export-btn" onclick="exportTXT()">⬇ TXT</button>
      <button class="export-btn" onclick="importJSON()">⬆ Import</button>
      <input type="file" id="import-file" style="display:none" accept=".json" onchange="handleImport(event)">
    </div>

    <div class="sidebar-section">
      <h4>📝 Note rapide</h4>
      <textarea class="note-area" id="quick-note" placeholder="Notes libres, idées…" oninput="saveNote()"></textarea>
    </div>

    <div class="sidebar-section">
      <h4>⚙️ Actions</h4>
      <button class="export-btn" onclick="clearDone()">🗑 Nettoyer faits</button>
      <button class="export-btn" onclick="clearAll()" style="color:var(--priority-high)">⚠ Tout effacer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ===== STATE =====
let tabs = [];
let activeTab = null;
let currentFilter = 'all';
let isMil = false;

function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ===== CLOCK =====
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('fr-FR');
  document.getElementById('datebox').textContent =
    now.toLocaleDateString('fr-FR', {weekday:'short', day:'2-digit', month:'2-digit', year:'numeric'}).toUpperCase();
}
setInterval(updateClock, 1000);
updateClock();

// ===== THEME =====
function toggleTheme() {
  isMil = !isMil;
  document.body.classList.toggle('mil', isMil);
  document.getElementById('theme-toggle').textContent = isMil ? '☀ CIVIL' : '⚡ MIL';
  localStorage.setItem('log_theme', isMil ? 'mil' : 'civil');
}

// ===== TABS =====
function addTab(name) {
  const id = genId();
  const tab = { id, name: name || `Onglet ${tabs.length+1}`, entries: [], note: '' };
  tabs.push(tab);
  saveTabs();
  renderTabs();
  setActiveTab(id);
  return id;
}

function setActiveTab(id) {
  activeTab = id;
  renderTabs();
  renderEntries();
  loadNote();
  updateStats();
}

function removeTab(id, e) {
  e.stopPropagation();
  if (tabs.length <= 1) { toast('Impossible de supprimer le dernier onglet'); return; }
  if (!confirm('Supprimer cet onglet et ses entrées ?')) return;
  tabs = tabs.filter(t => t.id !== id);
  if (activeTab === id) activeTab = tabs[0].id;
  saveTabs();
  renderTabs();
  renderEntries();
  updateStats();
}

function renderTabs() {
  const bar = document.getElementById('tabs-bar');
  const addBtn = document.getElementById('add-tab');
  bar.querySelectorAll('.tab').forEach(el => el.remove());

  tabs.forEach(tab => {
    const isActive = tab.id === activeTab;
    const el = document.createElement('div');
    el.className = 'tab' + (isActive ? ' active' : '');
    el.dataset.tabId = tab.id;

    // Input nom
    const nameInput = document.createElement('input');
    nameInput.className = 'tab-name';
    nameInput.value = tab.name;
    nameInput.readOnly = !isActive;
    nameInput.title = isActive ? 'Cliquer pour renommer' : 'Cliquer pour ouvrir';

    // Sur onglet inactif : clic simple = switcher
    if (!isActive) {
      nameInput.addEventListener('mousedown', e => {
        e.preventDefault(); // empêche le focus input
        setActiveTab(tab.id);
      });
    } else {
      // Onglet actif : double-clic = sélectionner tout pour renommer
      nameInput.addEventListener('dblclick', () => nameInput.select());
      nameInput.addEventListener('blur', () => renameTab(tab.id, nameInput.value));
      nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') nameInput.blur(); });
    }

    // Badge
    const badge = tab.entries.length > 0 ? (() => {
      const b = document.createElement('span');
      b.className = 'tab-badge';
      b.textContent = tab.entries.length;
      return b;
    })() : null;

    // Bouton fermer
    const closeBtn = document.createElement('span');
    closeBtn.className = 'tab-close';
    closeBtn.textContent = '✕';
    closeBtn.title = 'Fermer';
    closeBtn.addEventListener('click', e => { e.stopPropagation(); removeTab(tab.id, e); });

    el.appendChild(nameInput);
    if (badge) el.appendChild(badge);
    el.appendChild(closeBtn);

    bar.insertBefore(el, addBtn);
  });
}

function renameTab(id, name) {
  const tab = tabs.find(t => t.id === id);
  if (tab) { tab.name = name || tab.name; saveTabs(); renderTabs(); }
}

// ===== ENTRIES =====
function addEntry() {
  const text = document.getElementById('entry-input').value.trim();
  if (!text) { document.getElementById('entry-input').focus(); return; }
  const priority = document.getElementById('priority-sel').value;
  const tag = document.getElementById('tag-input').value.trim().replace(/^#/,'');
  const now = new Date();
  const entry = {
    id: genId(),
    text,
    priority,
    tag,
    ts: now.toISOString(),
    done: false
  };
  const tab = tabs.find(t => t.id === activeTab);
  if (!tab) return;
  tab.entries.unshift(entry);
  document.getElementById('entry-input').value = '';
  document.getElementById('tag-input').value = '';
  saveTabs();
  renderEntries();
  updateStats();
  renderTabs();
  toast('Entrée ajoutée');
}

function deleteEntry(tabId, entryId) {
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  tab.entries = tab.entries.filter(e => e.id !== entryId);
  saveTabs();
  renderEntries();
  updateStats();
  renderTabs();
}

function toggleDone(tabId, entryId) {
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  const entry = tab.entries.find(e => e.id === entryId);
  if (entry) entry.done = !entry.done;
  saveTabs();
  renderEntries();
  updateStats();
}

function renderEntries() {
  const tab = tabs.find(t => t.id === activeTab);
  const list = document.getElementById('log-list');
  list.innerHTML = '';
  if (!tab || tab.entries.length === 0) {
    list.innerHTML = '<div class="empty-state">Aucune entrée dans cet onglet.<br>Saisissez une ligne et appuyez sur Entrée.</div>';
    document.getElementById('entry-count').textContent = '0 entrée(s)';
    return;
  }
  const search = document.getElementById('search-input').value.toLowerCase();
  let shown = 0;
  tab.entries.forEach(entry => {
    const matchFilter = currentFilter === 'all' ||
      (currentFilter === 'done' && entry.done) ||
      (currentFilter !== 'done' && entry.priority === currentFilter && !entry.done);
    const matchSearch = !search || entry.text.toLowerCase().includes(search) ||
      (entry.tag && entry.tag.toLowerCase().includes(search));
    const el = document.createElement('div');
    el.className = `log-entry p-${entry.priority}${entry.done ? ' done' : ''}${(!matchFilter || !matchSearch) ? ' hidden' : ''}`;
    if (matchFilter && matchSearch) shown++;

    const dt = new Date(entry.ts);
    const dateStr = dt.toLocaleDateString('fr-FR', {day:'2-digit',month:'2-digit',year:'2-digit'});
    const timeStr = dt.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});

    el.innerHTML = `
      <input type="checkbox" class="entry-check" ${entry.done?'checked':''} 
        onchange="toggleDone('${tab.id}','${entry.id}')">
      <span class="priority-dot"></span>
      <div class="entry-body">
        <div class="entry-meta">
          <span class="entry-ts">📅 ${dateStr} ${timeStr}</span>
          ${entry.tag ? `<span class="entry-tag">#${entry.tag}</span>` : ''}
        </div>
        <div class="entry-text" contenteditable="true"
          onblur="editEntry('${tab.id}','${entry.id}',this.textContent)">${entry.text}</div>
      </div>
      <div class="entry-actions">
        <button class="entry-action" onclick="deleteEntry('${tab.id}','${entry.id}')" title="Supprimer">🗑</button>
        <button class="entry-action" onclick="copyEntry('${entry.text}')" title="Copier">📋</button>
      </div>`;
    list.appendChild(el);
  });
  document.getElementById('entry-count').textContent = `${shown} entrée(s)`;
}

function editEntry(tabId, entryId, newText) {
  const tab = tabs.find(t => t.id === tabId);
  if (!tab) return;
  const entry = tab.entries.find(e => e.id === entryId);
  if (entry) entry.text = newText.trim();
  saveTabs();
}

function copyEntry(text) {
  navigator.clipboard.writeText(text).then(() => toast('Copié !'));
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderEntries();
}

function filterEntries() { renderEntries(); }

// ===== STATS =====
function updateStats() {
  const tab = tabs.find(t => t.id === activeTab);
  if (!tab) return;
  const todayStr = new Date().toDateString();
  document.getElementById('stat-total').textContent = tab.entries.length;
  document.getElementById('stat-high').textContent = tab.entries.filter(e => e.priority==='high' && !e.done).length;
  document.getElementById('stat-done').textContent = tab.entries.filter(e => e.done).length;
  document.getElementById('stat-today').textContent = tab.entries.filter(e => new Date(e.ts).toDateString() === todayStr).length;
}

// ===== NOTE =====
function loadNote() {
  const tab = tabs.find(t => t.id === activeTab);
  document.getElementById('quick-note').value = tab ? (tab.note || '') : '';
}
function saveNote() {
  const tab = tabs.find(t => t.id === activeTab);
  if (tab) tab.note = document.getElementById('quick-note').value;
  saveTabs();
}

// ===== EXPORT =====
function exportJSON() {
  const tab = tabs.find(t => t.id === activeTab);
  if (!tab) return;
  const blob = new Blob([JSON.stringify(tab, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `log_${tab.name.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('Export JSON OK');
}
function exportTXT() {
  const tab = tabs.find(t => t.id === activeTab);
  if (!tab) return;
  const lines = tab.entries.map(e => {
    const dt = new Date(e.ts);
    return `[${dt.toLocaleDateString('fr-FR')} ${dt.toLocaleTimeString('fr-FR')}] [${e.priority.toUpperCase()}]${e.tag?` #${e.tag}`:''} ${e.done?'[FAIT] ':''}${e.text}`;
  });
  const blob = new Blob([`=== ${tab.name} ===\n\n` + lines.join('\n')], {type:'text/plain'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `log_${tab.name.replace(/\s+/g,'_')}_${new Date().toISOString().slice(0,10)}.txt`;
  a.click(); toast('Export TXT OK');
}
function importJSON() { document.getElementById('import-file').click(); }
function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if (data.entries) {
        const id = addTab(data.name || 'Import');
        const tab = tabs.find(t => t.id === id);
        if (tab) tab.entries = data.entries;
        saveTabs(); renderEntries(); updateStats(); renderTabs();
        toast('Import OK');
      }
    } catch { toast('Erreur import JSON'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ===== CLEAR =====
function clearDone() {
  const tab = tabs.find(t => t.id === activeTab);
  if (!tab) return;
  const n = tab.entries.filter(e => e.done).length;
  if (!n) { toast('Aucune entrée "fait"'); return; }
  tab.entries = tab.entries.filter(e => !e.done);
  saveTabs(); renderEntries(); updateStats(); renderTabs();
  toast(`${n} entrée(s) supprimée(s)`);
}
function clearAll() {
  if (!confirm('Effacer TOUTES les entrées de cet onglet ?')) return;
  const tab = tabs.find(t => t.id === activeTab);
  if (!tab) return;
  tab.entries = [];
  saveTabs(); renderEntries(); updateStats(); renderTabs();
  toast('Onglet vidé');
}

// ===== PERSISTENCE =====
function saveTabs() { localStorage.setItem('log_tabs_v2', JSON.stringify(tabs)); }
function loadData() {
  const saved = localStorage.getItem('log_tabs_v2');
  if (saved) {
    try { tabs = JSON.parse(saved); } catch { tabs = []; }
  }
  if (!tabs.length) addTab('Général');
  else { activeTab = tabs[0].id; }
  const theme = localStorage.getItem('log_theme');
  if (theme === 'mil') toggleTheme();
  renderTabs();
  renderEntries();
  updateStats();
  loadNote();
}

// ===== TOAST =====
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===== KEYBOARD SHORTCUTS =====
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addEntry();
  if ((e.ctrlKey || e.metaKey) && e.key === 't') { e.preventDefault(); addTab(); }
});

// ===== INIT =====
loadData();
</script>
</body>
</html>
